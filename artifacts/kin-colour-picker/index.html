<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Kin Colour Picker</title>
    <meta name="description" content="A curated colour picker tool — KIN-004 by dBridge for Kin." />
    <meta name="theme-color" content="#faf9f7" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KIN-004">
    <link rel="apple-touch-icon" id="apple-touch-icon" href="/icons/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch((err) => {
            console.warn("Service worker registration failed:", err);
          });
        });
      }
    </script>
    <script>
(function(){try{
var sz=180,c=document.createElement('canvas');c.width=sz;c.height=sz;
var ctx=c.getContext('2d');
var g=ctx.createLinearGradient(0,0,sz,sz);
g.addColorStop(0,'#3D5A6B');g.addColorStop(1,'#263d48');
ctx.fillStyle=g;
var r=36;ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(sz-r,0);ctx.arcTo(sz,0,sz,r,r);ctx.lineTo(sz,sz-r);ctx.arcTo(sz,sz,sz-r,sz,r);ctx.lineTo(r,sz);ctx.arcTo(0,sz,0,sz-r,r);ctx.lineTo(0,r);ctx.arcTo(0,0,r,0,r);ctx.closePath();ctx.fill();
var svgStr='<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 48 48"><circle cx="20" cy="20" r="8" stroke="white" stroke-width="2" fill="none" opacity="0.7"/><circle cx="28" cy="20" r="8" stroke="white" stroke-width="2" fill="none" opacity="0.7"/><circle cx="24" cy="27" r="8" stroke="white" stroke-width="2" fill="none" opacity="0.7"/></svg>';
var img=new Image(),blob=new Blob([svgStr],{type:'image/svg+xml'}),url=URL.createObjectURL(blob);
img.onload=function(){ctx.drawImage(img,42,42,96,96);URL.revokeObjectURL(url);var el=document.getElementById('apple-touch-icon');if(el)el.href=c.toDataURL('image/png');};img.src=url;
}catch(e){}})();
    </script>
  </body>
</html>

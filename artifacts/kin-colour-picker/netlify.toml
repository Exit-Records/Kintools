[build]
  command = "pnpm install && pnpm --filter @workspace/kin-colour-picker run build"
  publish = "artifacts/kin-colour-picker/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"
  BASE_PATH    = "/"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

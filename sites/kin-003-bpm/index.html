  <title>KIN-003 — BPM Counter — Kin</title>

  <style>
    /* ─────────────────────────────────────────────
       KIN-003 BPM Counter
       Creator: Darren
       ───────────────────────────────────────────── */

    :root {
      --bg:            #f5f7fa;
      --surface:       #ffffff;
      --surface-hi:    #f0f2f5;
      --border:        #dde1ec;
      --text-primary:  #1a1f2e;
      --text-secondary:#5a6680;
      --text-dim:      #8a96aa;
      --accent:        #c8943a;
      --accent-glow:   rgba(200,148,58,0.15);
      --accent-dim:    rgba(200,148,58,0.08);
      --tap-active:    #d4a853;
      --font-sans: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'DM Mono', 'Courier New', monospace;
    }

    html.dark {
      --bg:            #1a1714;
      --surface:       #242018;
      --surface-hi:    #2e2923;
      --border:        #3a342c;
      --text-primary:  #f0ece4;
      --text-secondary:#8c8072;
      --text-dim:      #5a5248;
      --accent:        #d4a853;
      --accent-glow:   rgba(212, 168, 83, 0.18);
      --accent-dim:    rgba(212, 168, 83, 0.08);
      --tap-active:    #e8ba6a;
    }
    #theme-btn {
      position: fixed; top: 14px; right: 14px; z-index: 999;
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--surface-hi); border: 1px solid var(--border);
      color: var(--text-secondary); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    #theme-btn:hover { background: var(--border); }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .app-shell {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      max-width: 420px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .app-header {
      padding: 28px 0 0;
    }

    .kin-wordmark {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .app-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 0 40px;
    }

    /* ─── BPM Display ─── */

    .bpm-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      margin-bottom: 24px;
    }

    .bpm-number {
      font-family: var(--font-mono);
      font-size: clamp(88px, 22vw, 120px);
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .bpm-label {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: var(--accent);
      margin-top: 8px;
      text-transform: uppercase;
    }

    .bpm-prompt {
      font-family: var(--font-mono);
      font-size: clamp(40px, 10vw, 56px);
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 0.3em;
      line-height: 1;
      opacity: 0.5;
    }

    /* ─── Session average ─── */

    .bpm-avg {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.12em;
      color: var(--text-secondary);
      margin-top: 10px;
      opacity: 0.65;
      text-transform: uppercase;
    }
    .bpm-avg strong {
      font-weight: 600;
      color: var(--accent);
      opacity: 1;
    }
    .bpm-avg[hidden] { display: none; }

    /* ─── Confidence bar ─── */

    .confidence-bar {
      width: 100%;
      max-width: 200px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 44px;
    }

    .confidence-bar[hidden] {
      display: none;
    }

    .confidence-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }

    /* ─── Tap Button ─── */

    .tap-button {
      width: min(280px, 72vw);
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      transition:
        background 0.06s ease,
        border-color 0.06s ease,
        box-shadow 0.06s ease,
        transform 0.06s ease;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      box-shadow:
        0 0 0 0 var(--accent-glow),
        0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .tap-button:hover {
      background: var(--surface-hi);
      border-color: var(--accent);
      box-shadow:
        0 0 24px 4px var(--accent-glow),
        0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .tap-button:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .tap-button.active {
      background: var(--surface-hi);
      border-color: var(--tap-active);
      transform: scale(0.97);
      box-shadow:
        0 0 40px 8px var(--accent-glow),
        0 4px 16px rgba(0, 0, 0, 0.5);
    }

    .tap-button.active .tap-label {
      color: var(--tap-active);
    }

    .tap-label {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.22em;
      color: var(--text-secondary);
      transition: color 0.06s ease;
      pointer-events: none;
    }

    /* ─── Tap count ─── */

    .tap-count {
      margin-top: 28px;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      text-align: center;
      min-height: 18px;
    }

    /* ─── Reset ─── */

    .reset-button {
      margin-top: 20px;
      background: none;
      border: none;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      cursor: pointer;
      padding: 10px 20px;
      border-radius: 100px;
      transition: color 0.15s ease, background 0.15s ease;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }

    .reset-button:hover {
      color: var(--text-secondary);
      background: var(--accent-dim);
    }

    .reset-button[hidden] {
      display: none;
    }

    /* ─── Footer ─── */

    .app-footer {
      padding: 0 0 28px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--text-dim);
    }

    .footer-text {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    .footer-sep {
      color: var(--border);
      font-size: 11px;
      font-family: var(--font-mono);
    }

    @media (min-width: 640px) {
      .app-shell {
        padding: 0 40px;
      }

      .tap-button {
        width: 280px;
      }
    }
  
body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

<script>
  (function () {
    'use strict';

    const MAX_TAPS = 8;
    const TIMEOUT_MS = 3000;

    let taps = [];
    let tapCount = 0;
    let sessionStart = null;
    let timeoutId = null;
    let flashId = null;

    const tapBtn       = document.getElementById('tap-btn');
    const resetBtn     = document.getElementById('reset-btn');
    const bpmDisplay   = document.getElementById('bpm-display');
    const confidenceBar  = document.getElementById('confidence-bar');
    const confidenceFill = document.getElementById('confidence-fill');
    const tapCountEl   = document.getElementById('tap-count');
    const bpmPrompt    = document.getElementById('bpm-prompt');
    const bpmAvgEl     = document.getElementById('bpm-avg');

    function reset() {
      taps = [];
      tapCount = 0;
      sessionStart = null;
      if (timeoutId) clearTimeout(timeoutId);

      bpmDisplay.innerHTML = '<span class="bpm-prompt" id="bpm-prompt">· · ·</span>';
      confidenceBar.hidden = true;
      confidenceFill.style.width = '0%';
      tapCountEl.textContent = '';
      resetBtn.hidden = true;
      bpmAvgEl.hidden = true;
      bpmAvgEl.innerHTML = '';
    }

    function updateDisplay(bpm, confidence) {
      bpmDisplay.innerHTML =
        '<span class="bpm-number">' + bpm + '</span>' +
        '<span class="bpm-label">BPM</span>';
      confidenceBar.hidden = false;
      confidenceFill.style.width = (Math.min(confidence, 1) * 100) + '%';
      resetBtn.hidden = false;
    }

    function tap() {
      const now = performance.now();

      // Flash
      tapBtn.classList.add('active');
      if (flashId) clearTimeout(flashId);
      flashId = setTimeout(function () {
        tapBtn.classList.remove('active');
      }, 80);

      // Idle timeout — reset if no tap for TIMEOUT_MS
      if (timeoutId) clearTimeout(timeoutId);
      timeoutId = setTimeout(reset, TIMEOUT_MS);

      // Add tap
      if (sessionStart === null) sessionStart = now;
      taps.push(now);
      if (taps.length > MAX_TAPS) taps.shift();
      tapCount++;

      // Update count hint
      if (tapCount < 2) {
        tapCountEl.textContent = 'Keep tapping\u2026';
      } else {
        tapCountEl.textContent = tapCount + ' tap' + (tapCount === 1 ? '' : 's');
      }

      // Calculate rolling BPM
      if (taps.length >= 2) {
        var total = 0;
        for (var i = 1; i < taps.length; i++) {
          total += taps[i] - taps[i - 1];
        }
        var avg = total / (taps.length - 1);
        var bpm = Math.min(400, Math.max(10, Math.round(60000 / avg)));
        var confidence = taps.length / 4;
        updateDisplay(bpm, confidence);
      }

      // Session average (show after 4+ taps)
      if (tapCount >= 4 && sessionStart !== null) {
        var elapsed = now - sessionStart; // ms
        var sessionBpm = Math.min(400, Math.max(10, Math.round((tapCount - 1) / (elapsed / 60000))));
        bpmAvgEl.hidden = false;
        bpmAvgEl.innerHTML = 'Avg &nbsp;<strong>' + sessionBpm + '</strong>&nbsp; BPM';
      }
    }

    // Touch/click handler (pointerdown for fastest response)
    tapBtn.addEventListener('pointerdown', function (e) {
      e.preventDefault();
      tap();
    });

    resetBtn.addEventListener('click', reset);

    // Keyboard support
    document.addEventListener('keydown', function (e) {
      if (e.repeat) return;
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        tap();
      }
      if (e.code === 'Escape' || e.code === 'KeyR') {
        reset();
      }
    });
  })();
</script>

<script>
  // Theme toggle
  (function() {
    const btn = document.getElementById('theme-btn');
    const meta = document.getElementById('theme-color-meta');
    const saved = localStorage.getItem('kin003-theme');
    if (saved === 'dark') {
      document.documentElement.classList.add('dark');
      btn.textContent = '☀️';
      if (meta) meta.content = '#1a1714';
    }
    btn.addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark');
      btn.textContent = isDark ? '☀️' : '🌙';
      if (meta) meta.content = isDark ? '#1a1714' : '#f5f7fa';
      localStorage.setItem('kin003-theme', isDark ? 'dark' : 'light');
    });
  })();
</script>

  <!-- ── Bug report ──────────────────────────────────────────────── -->
  <style>
    #kin-bug-backdrop {
      display: none; position: fixed; inset: 0; z-index: 901;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(2px);
    }
    #kin-bug-sheet {
      display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 902;
      background: #17171f;
      border-radius: 20px 20px 0 0;
      border: 1px solid rgba(255,255,255,0.08); border-bottom: none;
      padding: 0 20px 40px;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    #kin-bug-sheet.open { transform: translateY(0); }
    #kin-bug-backdrop.open { display: block; }
    .kin-br-handle { display: flex; justify-content: center; padding: 12px 0 4px; }
    .kin-br-handle div { width: 36px; height: 4px; border-radius: 99px; background: rgba(255,255,255,0.15); }
    .kin-br-head { display: flex; align-items: center; justify-content: space-between; margin: 8px 0 20px; }
    .kin-br-head h2 { color: #fff; font-size: 16px; font-weight: 600; margin: 0; }
    .kin-br-head p  { color: rgba(255,255,255,0.35); font-size: 11px; margin: 3px 0 0; letter-spacing: 0.04em; }
    .kin-br-close {
      width: 30px !important; height: 30px !important; border-radius: 50%;
      background: rgba(255,255,255,0.07); border: none;
      color: rgba(255,255,255,0.5); cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex: none !important; min-height: 0 !important;
    }
    .kin-br-label { display: block; color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 7px; }
    .kin-br-field { margin-bottom: 14px; }
    .kin-br-select-wrap { position: relative; }
    .kin-br-select-wrap select {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 10px 36px 10px 12px; color: #fff; font-size: 13px;
      appearance: none; cursor: pointer; outline: none; font-family: inherit;
    }
    .kin-br-select-wrap::after {
      content: ''; position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      border: 5px solid transparent; border-top-color: rgba(255,255,255,0.4); margin-top: 3px;
    }
    .kin-br-ta {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 10px 12px; color: #fff; font-size: 13px; font-family: inherit;
      resize: none; outline: none; box-sizing: border-box;
    }
    .kin-br-ta::placeholder { color: rgba(255,255,255,0.25); }
    .kin-br-anon { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .kin-br-anon-text div:first-child { color: #fff; font-size: 13px; }
    .kin-br-anon-text div:last-child  { color: rgba(255,255,255,0.35); font-size: 11px; margin-top: 2px; }
    .kin-br-toggle {
      width: 44px !important; height: 26px !important; border-radius: 99px;
      background: #5b5ef4; border: none; cursor: pointer;
      position: relative; transition: background 0.2s; flex: none !important; min-height: 0 !important;
    }
    .kin-br-toggle::after {
      content: ''; position: absolute; top: 3px; left: calc(100% - 23px);
      width: 20px; height: 20px; border-radius: 50%; background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3); transition: left 0.2s;
    }
    .kin-br-toggle.off { background: rgba(255,255,255,0.1); }
    .kin-br-toggle.off::after { left: 3px; }
    .kin-br-extras { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
    .kin-br-input {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 10px 12px; color: #fff; font-size: 13px;
      font-family: inherit; outline: none; width: 100%; box-sizing: border-box;
    }
    .kin-br-input::placeholder { color: rgba(255,255,255,0.25); }
    .kin-br-submit {
      width: 100%; padding: 13px; border-radius: 12px;
      background: #5b5ef4; border: none; color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
      letter-spacing: 0.02em;
    }
    .kin-br-success { text-align: center; padding: 28px 0 8px; }
    .kin-br-success svg { display: block; margin: 0 auto 16px; }
    .kin-br-success h3 { color: #fff; font-size: 17px; font-weight: 600; margin: 0 0 8px; }
    .kin-br-success p  { color: rgba(255,255,255,0.4); font-size: 13px; line-height: 1.5; margin: 0 0 28px; }
    .kin-br-done {
      padding: 11px 32px; border-radius: 10px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7); font-size: 13px; cursor: pointer; font-family: inherit;
    }
  </style>

  <!-- Backdrop -->
  <div id="kin-bug-backdrop"></div>

  <!-- Bug report sheet -->
  <div id="kin-bug-sheet">
    <div id="kin-br-form-view">
      <div class="kin-br-handle"><div></div></div>
      <div class="kin-br-head">
        <div>
          <h2>Report an issue</h2>
          <p>KIN-003 — BPM Counter</p>
        </div>
        <button class="kin-br-close" id="kin-bug-close" aria-label="Close">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="kin-br-form">
        <div class="kin-br-field">
          <label class="kin-br-label">Type</label>
          <div class="kin-br-select-wrap">
            <select name="type">
              <option value="bug">🐛 Bug — something isn't working</option>
              <option value="suggestion">💡 Suggestion — an idea or request</option>
              <option value="other">💬 Other</option>
            </select>
          </div>
        </div>
        <div class="kin-br-field">
          <label class="kin-br-label">What happened?</label>
          <textarea class="kin-br-ta" name="description" rows="3" placeholder="Describe the issue or idea…" required></textarea>
        </div>
        <div class="kin-br-anon">
          <div class="kin-br-anon-text">
            <div>Send anonymously</div>
            <div>No name or email needed</div>
          </div>
          <button type="button" class="kin-br-toggle" id="kin-br-anon-toggle" aria-pressed="true"></button>
        </div>
        <div class="kin-br-extras" id="kin-br-extras" style="display:none">
          <input class="kin-br-input" type="text" name="name" placeholder="Your name (optional)">
        </div>
        <button type="submit" class="kin-br-submit">Send report</button>
      </form>
    </div>
    <div id="kin-br-success-view" style="display:none">
      <div class="kin-br-handle"><div></div></div>
      <div class="kin-br-success">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" stroke="#2ea043" stroke-width="1.5"/><path d="M7 12.5l3.5 3.5L17 9" stroke="#2ea043" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <h3>Thanks for the report</h3>
        <p>We'll take a look. Your feedback<br>helps make Kin better for everyone.</p>
        <button class="kin-br-done" id="kin-br-done">Done</button>
      </div>
    </div>
  </div>

  <script>
  (function() {
    var btn      = document.getElementById('kin-bug-btn');
    var backdrop = document.getElementById('kin-bug-backdrop');
    var sheet    = document.getElementById('kin-bug-sheet');
    var closeBtn = document.getElementById('kin-bug-close');
    var doneBtn  = document.getElementById('kin-br-done');
    var form     = document.getElementById('kin-br-form');
    var formView = document.getElementById('kin-br-form-view');
    var successView = document.getElementById('kin-br-success-view');
    var anonToggle = document.getElementById('kin-br-anon-toggle');
    var extras   = document.getElementById('kin-br-extras');
    var anon     = true;

    function openSheet() {
      backdrop.classList.add('open');
      sheet.style.display = 'block';
      requestAnimationFrame(function() { sheet.classList.add('open'); });
    }
    function closeSheet() {
      sheet.classList.remove('open');
      setTimeout(function() {
        sheet.style.display = 'none';
        backdrop.classList.remove('open');
        form.reset();
        formView.style.display = 'block';
        successView.style.display = 'none';
        anon = true;
        anonToggle.classList.remove('off');
        extras.style.display = 'none';
      }, 300);
    }

    btn.addEventListener('click', openSheet);
    backdrop.addEventListener('click', closeSheet);
    closeBtn.addEventListener('click', closeSheet);
    doneBtn.addEventListener('click', closeSheet);

    anonToggle.addEventListener('click', function() {
      anon = !anon;
      anonToggle.classList.toggle('off', !anon);
      extras.style.display = anon ? 'none' : 'flex';
    });

    var SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxBRGfOmtQUxyaBGjYVj2mtKinI7qlGm1v921K49TiBDP5RUY9CWK_M-vpLCm2HWJxhuA/exec';

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var data = new FormData(form);
      var typeRaw = data.get('type') || '';
      fetch(SHEETS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          form_type: 'bug_report',
          subject: 'KIN-003 \u2014 BPM Counter',
          app: 'KIN-003',
          type: typeRaw,
          description: data.get('description') || '',
          name: anon ? '' : (data.get('name') || '')
        })
      }).catch(function() {});
      formView.style.display = 'none';
      successView.style.display = 'block';
    });
  })();
  </script>

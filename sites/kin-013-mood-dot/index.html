<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Mood Dot — Kin</title>
<meta name="description" content="Ultra-minimal daily mood tracker. Tap a dot, add a note. Everything stays in your browser.">
<meta name="theme-color" id="theme-meta" content="#FAFAF7">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:         #FAFAF7;
  --surface:    #FFFFFF;
  --border:     #E8E4DC;
  --text:       #1A1A18;
  --text-mid:   #5C5A54;
  --text-dim:   #9C9A94;
  --m1: #B05252;
  --m2: #B07A40;
  --m3: #8A8A84;
  --m4: #5A8A70;
  --m5: #3D7A58;
}

html.dark {
  --bg:       #111110;
  --surface:  #1C1C1A;
  --border:   #2A2A27;
  --text:     #E8E4DC;
  --text-mid: #9C9A94;
  --text-dim: #4A4A46;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  -webkit-font-smoothing: antialiased;
  transition: background 0.2s, color 0.2s;
}

/* ── Toggle ────────────────────────────────── */
#toggle {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 999;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, border-color 0.2s;
}

/* ── Wrapper ─────────────────────────────── */
.wrap {
  width: 100%;
  max-width: 420px;
  padding: 56px 20px 40px;
  display: flex;
  flex-direction: column;
  gap: 32px;
}

/* ── Header ──────────────────────────────── */
.header h1 {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.header .sub {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 3px;
}

/* ── Section label ───────────────────────── */
.label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 14px;
}

/* ── Mood Dots ────────────────────────────── */
.dots-row {
  display: flex;
  gap: 8px;
  justify-content: space-between;
}

.dot-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 9px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 0;
  -webkit-tap-highlight-color: transparent;
}

.dot-circle {
  width: 54px;
  height: 54px;
  border-radius: 50%;
  opacity: 0.28;
  transition: opacity 0.18s, transform 0.15s, box-shadow 0.18s;
}

.dot-btn:hover .dot-circle,
.dot-btn:focus-visible .dot-circle {
  opacity: 0.55;
  transform: scale(1.06);
}

.dot-btn.selected .dot-circle {
  opacity: 1;
  transform: scale(1.1);
}

.dot-ring {
  width: 54px;
  height: 54px;
  border-radius: 50%;
  border: 2.5px solid transparent;
  position: absolute;
  top: 0; left: 0;
  transition: border-color 0.18s;
  pointer-events: none;
}

.dot-wrap {
  position: relative;
  width: 54px;
  height: 54px;
}

.dot-btn.selected .dot-ring {
  border-color: inherit;
  opacity: 0.5;
}

.dot-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--text-dim);
  text-align: center;
  line-height: 1.3;
  transition: color 0.18s;
}

.dot-btn.selected .dot-label {
  color: var(--text-mid);
}

/* ── Note ─────────────────────────────────── */
.note-field {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 15px;
  color: var(--text);
  font-family: inherit;
  resize: none;
  outline: none;
  transition: border-color 0.18s, background 0.2s;
  line-height: 1.55;
  min-height: 80px;
}

.note-field:focus {
  border-color: var(--text-dim);
}

.note-field::placeholder {
  color: var(--text-dim);
}

.note-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 6px;
  padding: 0 2px;
}

.note-count {
  font-size: 11px;
  color: var(--text-dim);
}

.note-clear {
  font-size: 11px;
  color: var(--text-dim);
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  visibility: hidden;
}

.note-clear.visible {
  visibility: visible;
}

.note-clear:hover {
  color: var(--text-mid);
}

/* ── 7-Day Grid ───────────────────────────── */
.grid {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.grid-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 12px;
  border-radius: 8px;
  border: 1px solid transparent;
  transition: background 0.15s;
}

.grid-row.today {
  background: var(--surface);
  border-color: var(--border);
}

.grid-day {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  width: 30px;
  flex-shrink: 0;
}

.grid-row.today .grid-day {
  color: var(--text-mid);
}

.grid-dot {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.18s;
}

.grid-date {
  font-size: 12px;
  color: var(--text-dim);
  flex: 1;
}

.grid-row.today .grid-date {
  color: var(--text-mid);
  font-weight: 500;
}

.grid-note-badge {
  font-size: 11px;
  color: var(--text-dim);
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.15s;
}

.grid-note-badge.visible {
  opacity: 1;
}

/* ── Saved indicator ─────────────────────── */
.saved-msg {
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
  opacity: 0;
  transition: opacity 0.3s;
  height: 14px;
  margin-top: -18px;
}

.saved-msg.show {
  opacity: 1;
}

/* ── Export ───────────────────────────────── */
.export-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  width: 100%;
  padding: 13px 20px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-mid);
  cursor: pointer;
  transition: border-color 0.18s, color 0.18s;
  font-family: inherit;
}

.export-btn:hover {
  border-color: var(--text-dim);
  color: var(--text);
}

/* ── Footer ───────────────────────────────── */
footer {
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
  display: flex;
  gap: 6px;
  align-items: center;
  justify-content: center;
  padding-top: 4px;
}

/* ── Responsive ───────────────────────────── */
@media (max-width: 380px) {
  .dot-circle, .dot-wrap, .dot-ring { width: 46px; height: 46px; }
  .dots-row { gap: 5px; }
}
</style>
</head>
<body>

<button id="toggle" onclick="toggleTheme()" aria-label="Toggle light/dark mode">🌙</button>

<div class="wrap">

  <div class="header">
    <h1>Mood Dot</h1>
    <div class="sub" id="date-display"></div>
  </div>

  <div class="dots-section">
    <div class="label">How are you feeling?</div>
    <div class="dots-row" id="dots-row"></div>
  </div>

  <div class="note-section">
    <div class="label">Note <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px;"> — optional</span></div>
    <textarea class="note-field" id="note-field" placeholder="Bad sleep, great meeting, stressful day…" maxlength="200" rows="3"></textarea>
    <div class="note-footer">
      <span class="note-count" id="note-count">0 / 200</span>
      <button class="note-clear" id="note-clear" onclick="clearNote()">Clear note</button>
    </div>
  </div>

  <div class="grid-section">
    <div class="label">Last 7 days</div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="saved-msg" id="saved-msg">Saved</div>

  <button class="export-btn" onclick="exportNotes()">&#8593; Export mood notes</button>

  <footer>
    <span>Kin</span>&nbsp;·&nbsp;<span>KIN-013</span>&nbsp;·&nbsp;<span>Darren</span>
  
  <div style="display:flex;justify-content:center;margin-top:8px"><span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:rgba(46,160,67,0.1);border:1px solid rgba(46,160,67,0.25);font-size:10px;font-weight:600;letter-spacing:0.08em;color:#2ea043;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"><svg width="9" height="11" viewBox="0 0 9 11" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.5 0.5L0.5 2.25V5.25C0.5 7.75 2.25 10.05 4.5 10.5C6.75 10.05 8.5 7.75 8.5 5.25V2.25L4.5 0.5Z" fill="#2ea043" fill-opacity="0.15" stroke="#2ea043" stroke-width="0.75"/><path d="M2.5 5.5L3.75 6.75L6.5 4" stroke="#2ea043" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>Local Only · Verified</span></div>

  <div style="margin-top:10px"><button id="kin-bug-btn" style="background:none;border:none;padding:0;color:inherit;font:inherit;opacity:0.4;font-size:11px;cursor:pointer;letter-spacing:0.04em;text-decoration:underline;text-underline-offset:3px;">Report a bug</button></div>
</footer>

</div>

<script>
const KEY   = 'kin-mood-dot';
const THEME = 'kin-mood-dot-theme';

const MOODS = [
  { level: 1, label: 'Very\nLow',  color: '#B05252' },
  { level: 2, label: 'Low',        color: '#B07A40' },
  { level: 3, label: 'Neutral',    color: '#8A8A84' },
  { level: 4, label: 'Good',       color: '#5A8A70' },
  { level: 5, label: 'Very\nGood', color: '#3D7A58' },
];

const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let noteTimer = null;

/* ── Bootstrap ──────────────────────────────── */
(function () {
  const saved = localStorage.getItem(THEME);
  if (saved === 'dark') {
    document.documentElement.classList.add('dark');
    document.getElementById('toggle').textContent = '☀️';
    document.getElementById('theme-meta').content = '#111110';
  }

  const now = new Date();
  document.getElementById('date-display').textContent =
    DAYS[now.getDay()] + ', ' + MONTHS[now.getMonth()] + ' ' + now.getDate();

  renderDots();
  renderGrid();

  const data = loadData();
  const today = getToday();
  if (data[today]) {
    const note = data[today].note || '';
    const tf = document.getElementById('note-field');
    tf.value = note;
    updateNoteUI();
  }

  document.getElementById('note-field').addEventListener('input', function () {
    updateNoteUI();
    clearTimeout(noteTimer);
    noteTimer = setTimeout(saveNote, 500);
  });
}());

/* ── Data helpers ─────────────────────────── */
function getToday() {
  return new Date().toISOString().slice(0, 10);
}

function loadData() {
  try { return JSON.parse(localStorage.getItem(KEY) || '{}'); }
  catch { return {}; }
}

function saveData(d) {
  localStorage.setItem(KEY, JSON.stringify(d));
}

function showSaved() {
  const el = document.getElementById('saved-msg');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1600);
}

/* ── Theme ────────────────────────────────── */
function toggleTheme() {
  const dark = document.documentElement.classList.toggle('dark');
  document.getElementById('toggle').textContent = dark ? '☀️' : '🌙';
  document.getElementById('theme-meta').content  = dark ? '#111110' : '#FAFAF7';
  localStorage.setItem(THEME, dark ? 'dark' : 'light');
}

/* ── Mood dots ────────────────────────────── */
function renderDots() {
  const data    = loadData();
  const today   = getToday();
  const current = data[today]?.mood || null;
  const row     = document.getElementById('dots-row');
  row.innerHTML = '';

  MOODS.forEach(function (m) {
    const btn = document.createElement('button');
    btn.className = 'dot-btn' + (current === m.level ? ' selected' : '');
    btn.setAttribute('aria-label', m.label.replace('\n', ' '));
    btn.setAttribute('aria-pressed', current === m.level ? 'true' : 'false');
    btn.onclick = function () { selectMood(m.level); };

    const wrap   = document.createElement('div');
    wrap.className = 'dot-wrap';

    const circle = document.createElement('div');
    circle.className = 'dot-circle';
    circle.style.background = m.color;

    const ring   = document.createElement('div');
    ring.className = 'dot-ring';
    ring.style.borderColor = m.color;

    wrap.appendChild(circle);
    wrap.appendChild(ring);

    const lbl = document.createElement('div');
    lbl.className = 'dot-label';
    lbl.style.whiteSpace = 'pre-line';
    lbl.textContent = m.label;

    btn.appendChild(wrap);
    btn.appendChild(lbl);
    row.appendChild(btn);
  });
}

function selectMood(level) {
  const data  = loadData();
  const today = getToday();
  if (!data[today]) data[today] = { mood: null, note: '' };
  data[today].mood = level;
  saveData(data);
  renderDots();
  renderGrid();
  showSaved();
}

/* ── Note ─────────────────────────────────── */
function saveNote() {
  const note  = document.getElementById('note-field').value;
  const data  = loadData();
  const today = getToday();
  if (!data[today]) data[today] = { mood: null, note: '' };
  data[today].note = note.trim();
  saveData(data);
  renderGrid();
  showSaved();
}

function clearNote() {
  document.getElementById('note-field').value = '';
  updateNoteUI();
  saveNote();
}

function updateNoteUI() {
  const val = document.getElementById('note-field').value;
  document.getElementById('note-count').textContent = val.length + ' / 200';
  document.getElementById('note-clear').classList.toggle('visible', val.length > 0);
}

/* ── 7-Day grid ───────────────────────────── */
function getLast7Days() {
  const out   = [];
  const today = new Date();
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    out.push(d.toISOString().slice(0, 10));
  }
  return out;
}

function renderGrid() {
  const data  = loadData();
  const today = getToday();
  const grid  = document.getElementById('grid');
  grid.innerHTML = '';

  getLast7Days().forEach(function (dateStr) {
    const entry   = data[dateStr] || null;
    const d       = new Date(dateStr + 'T12:00:00');
    const isToday = dateStr === today;

    const row = document.createElement('div');
    row.className = 'grid-row' + (isToday ? ' today' : '');

    const dayEl = document.createElement('div');
    dayEl.className = 'grid-day';
    dayEl.textContent = DAYS[d.getDay()];

    const dotEl = document.createElement('div');
    dotEl.className = 'grid-dot';
    if (entry?.mood) {
      dotEl.style.background = MOODS[entry.mood - 1].color;
      dotEl.style.opacity    = '0.85';
    }

    const dateEl = document.createElement('div');
    dateEl.className = 'grid-date';
    dateEl.textContent = isToday
      ? 'Today'
      : MONTHS[d.getMonth()] + ' ' + d.getDate();

    const noteEl = document.createElement('div');
    noteEl.className = 'grid-note-badge' + (entry?.note ? ' visible' : '');
    noteEl.textContent = '✎';
    noteEl.title = entry?.note || '';

    row.appendChild(dayEl);
    row.appendChild(dotEl);
    row.appendChild(dateEl);
    row.appendChild(noteEl);
    grid.appendChild(row);
  });
}

/* ── Export ───────────────────────────────── */
function exportNotes() {
  const data    = loadData();
  const entries = Object.entries(data)
    .sort(function (a, b) { return a[0].localeCompare(b[0]); })
    .filter(function (e) { return e[1].mood; });

  if (!entries.length) {
    alert('No mood entries to export yet.');
    return;
  }

  var lines = entries.map(function (e) {
    var date  = e[0];
    var v     = e[1];
    var mood  = MOODS[v.mood - 1];
    var parts = [
      'Date: ' + date,
      'Mood: ' + v.mood + ' — ' + mood.label.replace('\n', ' '),
    ];
    if (v.note) parts.push('Note: ' + v.note);
    return parts.join('\n');
  }).join('\n\n');

  var blob = new Blob([lines], { type: 'text/plain' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url;
  a.download = 'mood-dot-' + getToday() + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>

    .kin-br-done {
      padding: 11px 32px; border-radius: 10px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7); font-size: 13px; cursor: pointer; font-family: inherit;
    }
  </style>

  <!-- Backdrop -->
  <div id="kin-bug-backdrop"></div>

  <!-- Bug report sheet -->
  <div id="kin-bug-sheet">
    <div id="kin-br-form-view">
      <div class="kin-br-handle"><div></div></div>
      <div class="kin-br-head">
        <div>
          <h2>Report an issue</h2>
          <p>KIN-013 — Mood Dot</p>
        </div>
        <button class="kin-br-close" id="kin-bug-close" aria-label="Close">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="kin-br-form">
        <div class="kin-br-field">
          <label class="kin-br-label">Type</label>
          <div class="kin-br-select-wrap">
            <select name="type">
              <option value="bug">🐛 Bug — something isn't working</option>
              <option value="suggestion">💡 Suggestion — an idea or request</option>
              <option value="other">💬 Other</option>
            </select>
          </div>
        </div>
        <div class="kin-br-field">
          <label class="kin-br-label">What happened?</label>
          <textarea class="kin-br-ta" name="description" rows="3" placeholder="Describe the issue or idea…" required></textarea>
        </div>
        <div class="kin-br-anon">
          <div class="kin-br-anon-text">
            <div>Send anonymously</div>
            <div>No name or email needed</div>
          </div>
          <button type="button" class="kin-br-toggle" id="kin-br-anon-toggle" aria-pressed="true"></button>
        </div>
        <div class="kin-br-extras" id="kin-br-extras" style="display:none">
          <input class="kin-br-input" type="text" name="name" placeholder="Your name (optional)">
          <input class="kin-br-input" type="email" name="email" placeholder="Email for follow-up (optional)">
        </div>
        <button type="submit" class="kin-br-submit">Send report</button>
      </form>
    </div>
    <div id="kin-br-success-view" style="display:none">
      <div class="kin-br-handle"><div></div></div>
      <div class="kin-br-success">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" stroke="#2ea043" stroke-width="1.5"/><path d="M7 12.5l3.5 3.5L17 9" stroke="#2ea043" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <h3>Thanks for the report</h3>
        <p>We'll take a look. Your feedback<br>helps make Kin better for everyone.</p>
        <button class="kin-br-done" id="kin-br-done">Done</button>
      </div>
    </div>
  </div>

  <script>
  (function() {
    var btn      = document.getElementById('kin-bug-btn');
    var backdrop = document.getElementById('kin-bug-backdrop');
    var sheet    = document.getElementById('kin-bug-sheet');
    var closeBtn = document.getElementById('kin-bug-close');
    var doneBtn  = document.getElementById('kin-br-done');
    var form     = document.getElementById('kin-br-form');
    var formView = document.getElementById('kin-br-form-view');
    var successView = document.getElementById('kin-br-success-view');
    var anonToggle = document.getElementById('kin-br-anon-toggle');
    var extras   = document.getElementById('kin-br-extras');
    var anon     = true;

    function openSheet() {
      backdrop.classList.add('open');
      sheet.style.display = 'block';
      requestAnimationFrame(function() { sheet.classList.add('open'); });
    }
    function closeSheet() {
      sheet.classList.remove('open');
      setTimeout(function() {
        sheet.style.display = 'none';
        backdrop.classList.remove('open');
        form.reset();
        formView.style.display = 'block';
        successView.style.display = 'none';
        anon = true;
        anonToggle.classList.remove('off');
        extras.style.display = 'none';
      }, 300);
    }

    btn.addEventListener('click', openSheet);
    backdrop.addEventListener('click', closeSheet);
    closeBtn.addEventListener('click', closeSheet);
    doneBtn.addEventListener('click', closeSheet);

    anonToggle.addEventListener('click', function() {
      anon = !anon;
      anonToggle.classList.toggle('off', !anon);
      extras.style.display = anon ? 'none' : 'flex';
    });

    var SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxBRGfOmtQUxyaBGjYVj2mtKinI7qlGm1v921K49TiBDP5RUY9CWK_M-vpLCm2HWJxhuA/exec';

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var data = new FormData(form);
      var typeRaw = data.get('type') || '';
      var formType = 'bug';
      if (typeRaw.toLowerCase().indexOf('feature') !== -1) formType = 'idea';
      else if (typeRaw.toLowerCase().indexOf('other') !== -1) formType = 'app_suggestion';
      fetch(SHEETS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          form_type: formType,
          subject: 'KIN-013 — Mood Dot',
          app: 'KIN-013',
          type: typeRaw,
          description: data.get('description') || '',
          name: anon ? 'Anonymous' : (data.get('name') || 'Not provided'),
          email: anon ? 'Anonymous' : (data.get('email') || 'Not provided')
        })
      }).catch(function() {});
      formView.style.display = 'none';
      successView.style.display = 'block';
    });
  })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Kin Nest · Baby Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" id="apple-touch-icon" href="">
  <meta name="theme-color" content="#059669">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Kin Nest">
  <style>
    :root {
      --bg:#f0fdf4; --card:#fff; --accent:#059669; --accent-dk:#047857;
      --accent-lt:#ecfdf5; --accent-bd:#6ee7b7; --fg:#111827; --muted:#6b7280;
      --border:#e5e7eb; --r:16px; --r-sm:10px; --shadow:0 2px 12px rgba(0,0,0,.06);
      --danger:#dc2626; --warn:#d97706; --info:#2563eb;
    }
    body.dark {
      --bg:#071a10; --card:#0f2418; --fg:#ecfdf5; --muted:#6b7280;
      --border:#1f3a28; --accent-lt:#0a2014; --accent-bd:#166534;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{font-size:16px}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--fg);min-height:100dvh;transition:background .4s,color .4s}

    /* Header */
    .kin-hdr{background:var(--accent);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
    .kin-logo{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .kin-ttl{font-size:17px;font-weight:700;color:#fff;flex:1}
    .kin-num{font-size:11px;font-weight:600;color:rgba(255,255,255,.75);background:rgba(255,255,255,.15);padding:3px 8px;border-radius:20px}
    .night-pill{font-size:11px;color:rgba(255,255,255,.7);background:rgba(0,0,0,.2);padding:2px 8px;border-radius:20px}

    /* Tabs */
    .tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:40}
    .tab{flex:1;padding:11px 4px;font-size:12px;font-weight:600;color:var(--muted);border:none;background:none;cursor:pointer;font-family:inherit;text-align:center;border-bottom:2px solid transparent;transition:all .15s}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

    /* Layout */
    .main{padding:14px 14px 32px;max-width:480px;margin:0 auto}
    .tab-pane{display:none}.tab-pane.active{display:block}
    .card{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--shadow);margin-bottom:12px}
    .sec-ttl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
    .hidden{display:none!important}

    /* Setup card */
    .setup-card{background:var(--accent-lt);border:1.5px solid var(--accent-bd);border-radius:var(--r);padding:14px;margin-bottom:12px}
    .setup-ttl{font-size:13px;font-weight:700;color:var(--accent-dk);margin-bottom:8px}
    .setup-fields{display:flex;gap:8px;flex-wrap:wrap}
    .setup-inp{flex:1;min-width:120px;height:38px;border:1.5px solid var(--accent-bd);border-radius:8px;background:var(--card);padding:0 10px;font-size:13px;font-family:inherit;color:var(--fg);outline:none}
    .setup-inp:focus{border-color:var(--accent)}
    .setup-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0 16px;height:38px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}

    /* Export reminder banner */
    .remind-banner{display:flex;align-items:center;gap:10px;background:#fffbeb;border:1px solid #fde68a;border-left:4px solid #f59e0b;border-radius:var(--r-sm);padding:10px 12px;margin-bottom:12px}
    body.dark .remind-banner{background:#1c1200;border-color:#78350f}
    .remind-body{flex:1}
    .remind-ttl{font-size:12px;font-weight:700;color:#92400e}
    .remind-sub{font-size:11px;color:#a16207}
    body.dark .remind-ttl,body.dark .remind-sub{color:#fde68a}
    .remind-act{display:flex;gap:6px;align-items:center;flex-shrink:0}
    .r-exp-btn{background:#f59e0b;color:#fff;border:none;border-radius:7px;padding:6px 11px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
    .r-dis-btn{background:none;border:none;font-size:16px;color:#a16207;cursor:pointer;padding:2px 4px;font-family:inherit}

    /* Sleep active bar */
    .sleep-bar{background:#eff6ff;border:1px solid #bfdbfe;border-left:4px solid var(--info);border-radius:var(--r-sm);padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:12px}
    body.dark .sleep-bar{background:#0d1f3c;border-color:#1e3a5f}
    .sleep-pulse{width:10px;height:10px;border-radius:50%;background:var(--info);animation:blink 1.5s infinite;flex-shrink:0}
    @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
    .sleep-bar-info{flex:1}.sleep-bar-lbl{font-size:12px;font-weight:700;color:var(--info)}
    .sleep-bar-dur{font-size:11px;color:var(--muted)}
    .sleep-stop-btn{background:var(--info);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}

    /* Dashboard grid */
    .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    .dash-card{background:var(--card);border-radius:var(--r-sm);padding:11px;box-shadow:var(--shadow)}
    .dash-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
    .dash-val{font-size:22px;font-weight:800;color:var(--fg);line-height:1}
    .dash-sub{font-size:10px;color:var(--muted);margin-top:3px}
    .risk-low{color:#059669}.risk-med{color:#d97706}.risk-high{color:#dc2626}

    /* Action buttons */
    .action-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
    .act-btn{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:14px 6px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;font-family:inherit;color:var(--fg);position:relative;overflow:hidden;transition:transform .1s,box-shadow .1s;user-select:none;-webkit-user-select:none}
    .act-btn:active{transform:scale(.96)}
    .act-btn.feed-btn{border-color:#fbcfe8}.act-btn.feed-btn:hover{background:#fdf2f8}
    .act-btn.sleep-act{border-color:#93c5fd}.act-btn.sleep-act:hover{background:#eff6ff}
    .act-btn.sleep-act.on{background:#dbeafe;border-color:var(--info)}
    body.dark .act-btn.sleep-act.on{background:#0d1f3c}
    .act-btn.diaper-btn{border-color:#fde68a}.act-btn.diaper-btn:hover{background:#fffbeb}
    .act-icon{font-size:30px;line-height:1}
    .act-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
    .act-sub{font-size:10px;color:var(--muted);text-align:center;line-height:1.3}
    .act-hint{font-size:9px;color:var(--muted);position:absolute;bottom:5px;left:0;right:0;text-align:center;}
    body.dark .act-hint{color:#86efac}

    /* Today stats chips */
    .stats-row{display:flex;gap:8px;margin-bottom:12px}
    .stat-chip{flex:1;background:var(--card);border-radius:10px;padding:10px 6px;text-align:center;box-shadow:var(--shadow)}
    .stat-chip-val{font-size:20px;font-weight:800;color:var(--fg)}
    .stat-chip-lbl{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}

    /* Reassurance */
    .re-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid var(--border);font-size:13px}
    .re-row:first-of-type{border-top:none}
    .re-lbl{color:var(--muted)}.re-val{font-weight:600}
    .ok{color:#059669}.warn{color:#d97706}.low{color:#dc2626}
    .re-overall{margin-top:10px;padding:9px 12px;background:var(--accent-lt);border-radius:8px;text-align:center;font-size:13px;font-weight:700;color:var(--accent-dk)}

    /* Intelligence */
    .intel-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid var(--border);font-size:13px}
    .intel-row:first-of-type{border-top:none}
    .intel-lbl{color:var(--muted)}.intel-val{font-weight:700}

    /* Timeline */
    .tl-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .tl-nav-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 14px;font-size:13px;cursor:pointer;font-family:inherit;color:var(--fg);transition:background .15s}
    .tl-nav-btn:hover{background:var(--accent-lt)}
    .tl-date-lbl{font-size:15px;font-weight:700}
    .tl-event{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-top:1px solid var(--border)}
    .tl-event:first-child{border-top:none}
    .tl-time{font-size:11px;font-weight:600;color:var(--muted);width:40px;flex-shrink:0;padding-top:2px}
    .tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
    .tl-dot.feed{background:#ec4899}.tl-dot.sleep{background:var(--info)}.tl-dot.wake{background:#f59e0b}.tl-dot.diaper{background:#f59e0b}.tl-dot.growth{background:#8b5cf6}.tl-dot.medicine{background:#10b981}
    .tl-body{flex:1}.tl-type{font-size:13px;font-weight:600}.tl-detail{font-size:11px;color:var(--muted);margin-top:1px}
    .tl-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:6px;flex-shrink:0}
    .tl-del:hover{color:var(--danger);background:#fee2e2}
    .tl-empty{text-align:center;padding:32px 16px;color:var(--muted);font-size:14px}

    /* Growth */
    .growth-form{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .g-inp{flex:1;min-width:80px;height:38px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);padding:0 10px;font-size:13px;font-family:inherit;color:var(--fg);outline:none}
    .g-inp:focus{border-color:var(--accent)}
    .growth-entry{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid var(--border);font-size:13px}
    .growth-entry:first-of-type{border-top:none}
    .growth-date{color:var(--muted);font-size:11px}.growth-vals{font-weight:600}

    /* Settings */
    .sett-sec{margin-bottom:18px}
    .sett-ttl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
    .sett-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-top:1px solid var(--border)}
    .sett-row:first-of-type{border-top:none}
    .sett-lbl{font-size:14px;font-weight:600}.sett-sub{font-size:11px;color:var(--muted);margin-top:2px}
    .toggle{position:relative;width:44px;height:24px;cursor:pointer;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0;position:absolute}
    .tog-track{position:absolute;inset:0;background:var(--border);border-radius:12px;transition:background .2s}
    .toggle input:checked~.tog-track{background:var(--accent)}
    .tog-thumb{position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:transform .2s}
    .toggle input:checked~.tog-thumb{transform:translateX(20px)}
    .freq-pills{display:flex;gap:6px;margin-top:8px}
    .f-pill{flex:1;padding:7px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;text-align:center;font-family:inherit;transition:all .15s}
    .f-pill.active{border-color:var(--accent);color:var(--accent);background:var(--accent-lt)}
    .sett-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:6px;height:40px;padding:0 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
    .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-dk)}
    .btn-secondary{background:var(--card);color:var(--fg);border:1.5px solid var(--border)}.btn-secondary:hover{background:var(--accent-lt)}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-sm{height:34px;font-size:12px;padding:0 12px}

    /* Overlays / modals */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
    .overlay.open{opacity:1;pointer-events:all}
    .sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
    .overlay.open .sheet{transform:translateY(0)}
    .sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
    .sheet-ttl{font-size:17px;font-weight:700;margin-bottom:14px}
    .fgrp{margin-bottom:12px}
    .flbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
    .finput{width:100%;height:42px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);padding:0 12px;font-size:15px;font-family:inherit;color:var(--fg);outline:none;transition:border-color .15s}
    .finput:focus{border-color:var(--accent)}
    .ftxt{height:64px;padding:10px 12px;resize:none;line-height:1.4}
    .sheet-foot{display:flex;gap:10px;margin-top:16px}

    /* Type grids */
    .type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
    .type-btn{border:2px solid var(--border);border-radius:10px;padding:11px 4px;text-align:center;cursor:pointer;background:var(--bg);font-family:inherit;transition:all .15s}
    .type-btn.sel{border-color:var(--accent);background:var(--accent-lt)}
    .type-icon{font-size:22px;display:block;margin-bottom:3px}
    .type-lbl{font-size:11px;font-weight:600;color:var(--muted)}
    .type-btn.sel .type-lbl{color:var(--accent)}

    /* Dialog */
    .dialog{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
    .dialog.open{opacity:1;pointer-events:all}
    .dlg-card{background:var(--card);border-radius:18px;padding:22px;width:100%;max-width:320px;text-align:center}
    .dlg-ttl{font-size:17px;font-weight:700;margin-bottom:7px}
    .dlg-body{font-size:14px;color:var(--muted);margin-bottom:18px;line-height:1.6}
    .dlg-row{display:flex;gap:10px}

    /* Footer */
    .kin-ftr{text-align:center;padding:24px 16px;font-size:11px;color:var(--muted);border-top:1px solid var(--border)}
    .kin-ftr a{color:var(--accent);text-decoration:none}
  </style>
</head>
<body>

<!-- HEADER -->
<header class="kin-hdr">
  <footer style="text-align:center;padding:16px 16px 48px;font-family:-apple-system,sans-serif;font-size:11px;letter-spacing:0.04em;color:#9a8b7e">
  KIN-018 · <a href="https://kintools.netlify.app/" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">Kin Tools</a> · by Alice and Darren

  <div style="display:flex;justify-content:center;margin-top:8px"><span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:rgba(46,160,67,0.1);border:1px solid rgba(46,160,67,0.25);font-size:10px;font-weight:600;letter-spacing:0.08em;color:#2ea043;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"><svg width="9" height="11" viewBox="0 0 9 11" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.5 0.5L0.5 2.25V5.25C0.5 7.75 2.25 10.05 4.5 10.5C6.75 10.05 8.5 7.75 8.5 5.25V2.25L4.5 0.5Z" fill="#2ea043" fill-opacity="0.15" stroke="#2ea043" stroke-width="0.75"/><path d="M2.5 5.5L3.75 6.75L6.5 4" stroke="#2ea043" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>Local Only · Verified</span></div>

  <div style="margin-top:10px"><button id="kin-bug-btn" style="background:none;border:none;padding:0;color:inherit;font:inherit;opacity:0.4;font-size:11px;cursor:pointer;letter-spacing:0.04em;text-decoration:underline;text-underline-offset:3px;">Report a bug</button></div>
</footer>

  <!-- ── Bug report ──────────────────────────────────────────────── -->
  <style>
    #kin-bug-backdrop {
      display: none; position: fixed; inset: 0; z-index: 901;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(2px);
    }
    #kin-bug-sheet {
      display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 902;
      background: #17171f;
      border-radius: 20px 20px 0 0;
      border: 1px solid rgba(255,255,255,0.08); border-bottom: none;
      padding: 0 20px 40px;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    #kin-bug-sheet.open { transform: translateY(0); }
    #kin-bug-backdrop.open { display: block; }
    .kin-br-handle { display: flex; justify-content: center; padding: 12px 0 4px; }
    .kin-br-handle div { width: 36px; height: 4px; border-radius: 99px; background: rgba(255,255,255,0.15); }
    .kin-br-head { display: flex; align-items: center; justify-content: space-between; margin: 8px 0 20px; }
    .kin-br-head h2 { color: #fff; font-size: 16px; font-weight: 600; margin: 0; }
    .kin-br-head p  { color: rgba(255,255,255,0.35); font-size: 11px; margin: 3px 0 0; letter-spacing: 0.04em; }
    .kin-br-close {
      width: 30px !important; height: 30px !important; border-radius: 50%;
      background: rgba(255,255,255,0.07); border: none;
      color: rgba(255,255,255,0.5); cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex: none !important; min-height: 0 !important;
    }
    .kin-br-label { display: block; color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 7px; }
    .kin-br-field { margin-bottom: 14px; }
    .kin-br-select-wrap { position: relative; }
    .kin-br-select-wrap select {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 10px 36px 10px 12px; color: #fff; font-size: 13px;
      appearance: none; cursor: pointer; outline: none; font-family: inherit;
    }
    .kin-br-select-wrap::after {
      content: ''; position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      border: 5px solid transparent; border-top-color: rgba(255,255,255,0.4); margin-top: 3px;
    }
    .kin-br-ta {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 10px 12px; color: #fff; font-size: 13px; font-family: inherit;
      resize: none; outline: none; box-sizing: border-box;
    }
    .kin-br-ta::placeholder { color: rgba(255,255,255,0.25); }
    .kin-br-anon { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .kin-br-anon-text div:first-child { color: #fff; font-size: 13px; }
    .kin-br-anon-text div:last-child  { color: rgba(255,255,255,0.35); font-size: 11px; margin-top: 2px; }
    .kin-br-toggle {
      width: 44px !important; height: 26px !important; border-radius: 99px;
      background: #5b5ef4; border: none; cursor: pointer;
      position: relative; transition: background 0.2s; flex: none !important; min-height: 0 !important;
    }
    .kin-br-toggle::after {
      content: ''; position: absolute; top: 3px; left: calc(100% - 23px);
      width: 20px; height: 20px; border-radius: 50%; background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3); transition: left 0.2s;
    }
    .kin-br-toggle.off { background: rgba(255,255,255,0.1); }
    .kin-br-toggle.off::after { left: 3px; }
    .kin-br-extras { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
    .kin-br-input {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 10px 12px; color: #fff; font-size: 13px;
      font-family: inherit; outline: none; width: 100%; box-sizing: border-box;
    }
    .kin-br-input::placeholder { color: rgba(255,255,255,0.25); }
    .kin-br-submit {
      width: 100%; padding: 13px; border-radius: 12px;
      background: #5b5ef4; border: none; color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;

  (function() {
    var btn      = document.getElementById('kin-bug-btn');

    var sheet    = document.getElementById('kin-bug-sheet');
    var closeBtn = document.getElementById('kin-bug-close');

    var formView = document.getElementById('kin-br-form-view');
    var successView = document.getElementById('kin-br-success-view');
    var anonToggle = document.getElementById('kin-br-anon-toggle');
    var extras   = document.getElementById('kin-br-extras');
    var anon     = true;

    function openSheet() {
      backdrop.classList.add('open');
      sheet.style.display = 'block';
      requestAnimationFrame(function() { sheet.classList.add('open'); });
    }
    function closeSheet() {
      sheet.classList.remove('open');
      setTimeout(function() {
        sheet.style.display = 'none';
        backdrop.classList.remove('open');
        form.reset();
        formView.style.display = 'block';
        successView.style.display = 'none';
        anon = true;
        anonToggle.classList.remove('off');
        extras.style.display = 'none';
      }, 300);
    }

    btn.addEventListener('click', openSheet);
    backdrop.addEventListener('click', closeSheet);
    closeBtn.addEventListener('click', closeSheet);
    doneBtn.addEventListener('click', closeSheet);

    anonToggle.addEventListener('click', function() {
      anon = !anon;
      anonToggle.classList.toggle('off', !anon);
      extras.style.display = anon ? 'none' : 'flex';
    });

    var SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxBRGfOmtQUxyaBGjYVj2mtKinI7qlGm1v921K49TiBDP5RUY9CWK_M-vpLCm2HWJxhuA/exec';

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var data = new FormData(form);
      var typeRaw = data.get('type') || '';
      var formType = 'bug';
      if (typeRaw.toLowerCase().indexOf('feature') !== -1) formType = 'idea';
      else if (typeRaw.toLowerCase().indexOf('other') !== -1) formType = 'app_suggestion';
      fetch(SHEETS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          form_type: formType,
          subject: 'KIN-018 — Kin Nest',
          app: 'KIN-018',
          type: typeRaw,
          description: data.get('description') || '',
          name: anon ? 'Anonymous' : (data.get('name') || 'Not provided'),
          email: anon ? 'Anonymous' : (data.get('email') || 'Not provided')
        })
      }).catch(function() {});
      formView.style.display = 'none';
      successView.style.display = 'block';
    });
  })();

function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.feeds && !data.sleep) { alert('Unrecognised file format.'); return; }
      const count = (data.feeds||[]).length + (data.sleep||[]).length;
      confirm2('Import data?', `This will replace all existing data with ${count} imported entries. This cannot be undone.`, () => {
        const merged = { ...defaultState(), ...data };
        state = merged; save(); render();
      });
    } catch { alert('Invalid JSON file.'); }
  };
  reader.readAsText(file);
  input.value = '';
}

function nukeAll() {
  confirm2('Delete all data?', 'All feeds, sleep, diaper logs and settings will be permanently erased. This cannot be undone.', () => {
    state = defaultState(); save(); render();
  });
}

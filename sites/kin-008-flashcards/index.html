<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Flashcards — KIN-008</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KIN-008">
  <link rel="apple-touch-icon" id="apple-touch-icon">
  <meta name="description" content="Browser-based flashcard tool. Create decks, study cards, import and export. All data stored locally." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b24;
      --surface2: #1e2530;
      --surface3: #242d3a;
      --border:   #2a3241;
      --accent:   #4a7fa5;
      --accent2:  #6aa3c8;
      --text:     #e2e8f0;
      --muted:    #6b7c93;
      --green:    #3ecf8e;
      --amber:    #f59e0b;
      --red:      #ef4444;
      --radius:   12px;
    }

    html.light {
      --bg:       #f5f7fa;
      --surface:  #ffffff;
      --surface2: #eef0f5;
      --surface3: #e4e8f2;
      --border:   #dde1ec;
      --accent:   #3a6a8a;
      --accent2:  #4a8aaa;
      --text:     #1a1f2e;
      --muted:    #5a6680;
      --green:    #1a8a5a;
      --amber:    #c47d00;
      --red:      #c03030;
    }
    html.light .ans-btn.know { background: rgba(26,138,90,0.15); border-color: #1a8a5a; color: #1a8a5a; }
    html.light .ans-btn.dontknow { background: rgba(192,48,48,0.12); border-color: #c03030; color: #c03030; }
    html.light .ans-btn.hard { background: rgba(196,125,0,0.12); border-color: #c47d00; color: #c47d00; }
    html.light .deck-delete-btn:hover { background: rgba(192,48,48,0.12); border-color: #c03030; }
    #theme-btn {
      position: fixed; top: 14px; right: 14px; z-index: 999;
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    #theme-btn:hover { border-color: var(--accent); color: var(--accent2); }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
      font: inherit;
    }
    input, textarea {
      font: inherit;
      color: inherit;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }

    /* ── Views ───────────────────────────────── */
    .view { display: none; flex-direction: column; min-height: 100vh; }
    .view.active { display: flex; }

    /* ── Header ──────────────────────────────── */
    .kin-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky; top: 0; z-index: 10;
    }
    .kin-header .brand { display: flex; flex-direction: column; gap: 1px; }
    .kin-header .brand-name { font-size: 17px; font-weight: 500; letter-spacing: -0.3px; }
    .kin-header .brand-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.12em; }
    .kin-badge {
      font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
      color: var(--accent); border: 1px solid var(--accent);
      border-radius: 4px; padding: 2px 7px;
    }
    .header-actions { display: flex; gap: 8px; align-items: center; padding-right: 46px; }
    .btn-icon {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: 18px; transition: all 0.15s;
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent2); }

    /* ── Back button ─────────────────────────── */
    .btn-back {
      display: flex; align-items: center; gap: 6px;
      color: var(--muted); font-size: 13px; padding: 6px 0;
      transition: color 0.15s;
    }
    .btn-back:hover { color: var(--text); }
    .btn-back svg { width: 16px; height: 16px; }

    /* ── Main content ─────────────────────────── */
    .view-content {
      flex: 1; padding: 24px 20px;
      max-width: 640px; width: 100%; margin: 0 auto;
    }

    /* ── HOME VIEW ───────────────────────────── */
    .home-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .home-top h2 { font-size: 18px; font-weight: 500; }

    .btn-primary {
      padding: 9px 20px; background: var(--accent);
      color: #fff; border-radius: 8px; font-weight: 500; font-size: 14px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover { background: var(--accent2); }
    .btn-primary:active { transform: scale(0.97); }

    .deck-grid { display: flex; flex-direction: column; gap: 10px; }

    .deck-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      text-align: left;
    }
    .deck-card:hover { border-color: var(--accent); background: var(--surface2); }
    .deck-card-info { flex: 1; min-width: 0; }
    .deck-card-name { font-weight: 500; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .deck-card-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .deck-card-progress {
      width: 100%; height: 3px; background: var(--surface3);
      border-radius: 2px; margin-top: 10px; overflow: hidden;
    }
    .deck-card-progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }
    .deck-delete-btn {
      width: 32px; height: 32px; border-radius: 7px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); background: transparent;
      transition: color 0.15s, background 0.15s;
      cursor: pointer; border: none;
    }
    .deck-delete-btn:hover { color: var(--red); background: #2a1010; }
    .deck-card-arrow { color: var(--muted); font-size: 18px; margin-left: 4px; flex-shrink: 0; cursor: pointer; }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-state p { font-size: 15px; }

    /* ── DECK VIEW ───────────────────────────── */
    .deck-header { margin-bottom: 20px; }
    .deck-title-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 6px;
    }
    .deck-title {
      font-size: 22px; font-weight: 600; flex: 1;
      cursor: pointer; border-radius: 6px;
      padding: 2px 6px; margin-left: -6px;
      transition: background 0.15s;
    }
    .deck-title:hover { background: var(--surface2); }
    .deck-meta { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

    .study-controls {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .btn-study {
      flex: 1; min-width: 120px;
      padding: 12px 16px; border-radius: 10px;
      font-weight: 500; font-size: 14px; text-align: center;
      background: var(--accent); color: #fff;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-study:hover { background: var(--accent2); }
    .btn-study:active { transform: scale(0.97); }
    .btn-study.secondary {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-study.secondary:hover { border-color: var(--accent); }

    .study-options {
      display: flex; gap: 16px; margin-bottom: 20px;
      padding: 14px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .toggle-opt {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--muted); cursor: pointer;
    }
    .toggle-opt input[type="checkbox"] {
      width: 16px; height: 16px; accent-color: var(--accent);
      cursor: pointer;
    }

    .filter-row {
      display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); transition: all 0.15s; cursor: pointer;
    }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .card-list { display: flex; flex-direction: column; gap: 8px; }

    .card-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .card-item-body { flex: 1; min-width: 0; }
    .card-item-front {
      font-size: 14px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-item-back {
      font-size: 13px; color: var(--muted); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-item-state {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      padding: 2px 7px; border-radius: 4px; flex-shrink: 0;
      margin-top: 2px;
    }
    .state-new    { background: var(--surface3); color: var(--muted); }
    .state-learning { background: #2a1f10; color: var(--amber); }
    .state-known  { background: #0d2b1e; color: var(--green); }
    .card-item-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .btn-sm {
      width: 28px; height: 28px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 14px;
      background: var(--surface2); transition: all 0.15s;
    }
    .btn-sm:hover { color: var(--text); background: var(--surface3); }
    .btn-sm.danger:hover { color: var(--red); }

    .add-card-form {
      margin-top: 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
    }
    .add-card-form h4 { font-size: 14px; font-weight: 500; margin-bottom: 12px; color: var(--muted); }
    .form-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .form-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-ghost {
      padding: 8px 16px; border-radius: 7px; font-size: 14px;
      color: var(--muted); transition: color 0.15s;
    }
    .btn-ghost:hover { color: var(--text); }
    .btn-save {
      padding: 8px 20px; border-radius: 7px; font-size: 14px; font-weight: 500;
      background: var(--accent); color: #fff; transition: background 0.15s;
    }
    .btn-save:hover { background: var(--accent2); }

    .cloze-tip {
      font-size: 12px; color: var(--muted); margin-bottom: 12px;
      padding: 10px 12px; background: var(--surface3);
      border-radius: 7px; line-height: 1.6;
    }
    .cloze-tip code {
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px;
      background: var(--bg); padding: 1px 5px; border-radius: 4px;
      color: var(--accent2);
    }
    .cloze-tip-label {
      font-weight: 600; color: var(--accent2); margin-right: 4px;
    }
    .btn-add-card {
      width: 100%; padding: 12px; margin-top: 12px;
      border-radius: var(--radius); border: 1px dashed var(--border);
      color: var(--muted); font-size: 14px;
      transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-add-card:hover { border-color: var(--accent); color: var(--accent2); }

    /* ── STUDY VIEW ──────────────────────────── */
    #view-study {
      background: var(--bg);
    }
    .study-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
    }
    .study-progress-text { font-size: 13px; color: var(--muted); }
    .study-deck-name { font-size: 14px; font-weight: 500; }

    .study-progress-bar {
      height: 3px; background: var(--surface2);
      width: 100%; overflow: hidden;
    }
    .study-progress-fill {
      height: 100%; background: var(--accent);
      transition: width 0.4s ease;
    }

    .study-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 20px; gap: 24px;
    }

    /* Card flip */
    .flashcard-scene {
      width: 100%; max-width: 480px;
      perspective: 1200px;
      cursor: pointer;
    }
    .flashcard {
      width: 100%; min-height: 220px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 16px;
    }
    .flashcard.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-align: center;
    }
    .card-face.back {
      transform: rotateY(180deg);
      background: var(--surface2);
      border-color: var(--accent);
    }
    .card-face-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
      color: var(--muted); margin-bottom: 16px; text-transform: uppercase;
    }
    .card-face-text {
      font-size: clamp(18px, 4vw, 26px); font-weight: 400;
      line-height: 1.4; color: var(--text);
    }
    .card-face-hint {
      font-size: 12px; color: var(--muted); margin-top: 20px;
      display: flex; align-items: center; gap: 4px;
    }
    .card-face-hint kbd {
      font: inherit; font-size: 11px;
      background: var(--surface3); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px;
    }

    /* Cloze blanks */
    .cloze-blank {
      display: inline-block;
      border-bottom: 2px solid var(--accent);
      min-width: 80px; color: transparent;
      user-select: none;
    }
    .cloze-answer { color: var(--accent2); font-weight: 500; }

    /* Answer buttons */
    .answer-buttons {
      display: flex; gap: 10px; width: 100%; max-width: 480px;
    }
    .ans-btn {
      flex: 1; padding: 14px 10px; border-radius: 10px;
      font-size: 14px; font-weight: 500; text-align: center;
      transition: background 0.15s, transform 0.1s, opacity 0.2s;
      border: 1px solid transparent;
    }
    .ans-btn:active { transform: scale(0.96); }
    .ans-btn.hidden { opacity: 0; pointer-events: none; }
    .ans-btn.know {
      background: #0d2b1e; color: var(--green); border-color: #1a4030;
    }
    .ans-btn.know:hover { background: #0f3522; border-color: var(--green); }
    .ans-btn.hard {
      background: #261f0d; color: var(--amber); border-color: #3d300f;
    }
    .ans-btn.hard:hover { background: #2e2610; border-color: var(--amber); }
    .ans-btn.dontknow {
      background: #2a1010; color: var(--red); border-color: #3d1515;
    }
    .ans-btn.dontknow:hover { background: #321212; border-color: var(--red); }

    .flip-hint {
      font-size: 12px; color: var(--muted); text-align: center;
    }

    /* Study complete */
    .study-complete {
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      flex: 1; padding: 40px 24px; text-align: center; gap: 20px;
    }
    .study-complete .big-icon { font-size: 56px; }
    .study-complete h2 { font-size: 22px; font-weight: 500; }
    .study-complete p { color: var(--muted); font-size: 15px; max-width: 300px; }
    .study-stats {
      display: flex; gap: 24px; margin: 8px 0;
    }
    .stat-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .stat-num { font-size: 28px; font-weight: 600; }
    .stat-lbl { font-size: 12px; color: var(--muted); }
    .stat-green { color: var(--green); }
    .stat-amber { color: var(--amber); }
    .stat-red   { color: var(--red); }

    /* ── MODAL ───────────────────────────────── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; width: 100%; max-width: 500px;
      max-height: 80vh; overflow-y: auto;
    }
    .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .btn-danger {
      padding: 8px 18px; border-radius: 7px; font-size: 14px; font-weight: 500;
      background: #2a1010; color: var(--red); border: 1px solid #3d1515;
      transition: background 0.15s;
    }
    .btn-danger:hover { background: #321212; }

    /* ── Deck actions row ─────────────────────── */
    .deck-actions-row {
      display: flex; gap: 8px; margin-top: 12px; margin-bottom: 20px;
      padding-top: 14px; border-top: 1px solid var(--border);
    }
    .btn-deck-action {
      padding: 7px 14px; border-radius: 7px; font-size: 13px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); transition: all 0.15s;
    }
    .btn-deck-action:hover { border-color: var(--accent); color: var(--accent2); }
    .btn-deck-action.danger:hover { border-color: var(--red); color: var(--red); }

    /* ── Toast ───────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 20px; font-size: 13px;
      transition: transform 0.3s; z-index: 200; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .study-options { flex-direction: column; gap: 12px; }
      .ans-btn { font-size: 13px; padding: 12px 6px; }
    }

    /* Demo bar */
    .demo-bar {
      display: none; background: #1a2e22; padding: 10px 16px;
      justify-content: space-between; align-items: center;
      border-bottom: 1px solid #1a4030; position: sticky; top: 0; z-index: 50;
    }
    .demo-bar.visible { display: flex; }
    .demo-bar span { font-size: 13px; font-weight: 600; color: var(--green); }
    .demo-bar button {
      font-size: 13px; font-weight: 700; color: #fff; background: var(--green);
      border: none; border-radius: 8px; padding: 6px 14px; cursor: pointer;
      min-height: 32px; flex: none;
    }
  </style>
</head>

  <!-- ── Bug report ──────────────────────────────────────────────── -->
  <style>
    #kin-bug-backdrop {
      display: none; position: fixed; inset: 0; z-index: 901;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(2px);
    }
    #kin-bug-sheet {
      display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 902;
      background: #17171f;
      border-radius: 20px 20px 0 0;
      border: 1px solid rgba(255,255,255,0.08); border-bottom: none;
      padding: 0 20px 40px;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    #kin-bug-sheet.open { transform: translateY(0); }
    #kin-bug-backdrop.open { display: block; }
    .kin-br-handle { display: flex; justify-content: center; padding: 12px 0 4px; }
    .kin-br-handle div { width: 36px; height: 4px; border-radius: 99px; background: rgba(255,255,255,0.15); }
    .kin-br-head { display: flex; align-items: center; justify-content: space-between; margin: 8px 0 20px; }
    .kin-br-head h2 { color: #fff; font-size: 16px; font-weight: 600; margin: 0; }
    .kin-br-head p  { color: rgba(255,255,255,0.35); font-size: 11px; margin: 3px 0 0; letter-spacing: 0.04em; }
    .kin-br-close {
      width: 30px !important; height: 30px !important; border-radius: 50%;
      background: rgba(255,255,255,0.07); border: none;
      color: rgba(255,255,255,0.5); cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex: none !important; min-height: 0 !important;
    }
    .kin-br-label { display: block; color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 7px; }
    .kin-br-field { margin-bottom: 14px; }
    .kin-br-select-wrap { position: relative; }
    .kin-br-select-wrap select {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 10px 36px 10px 12px; color: #fff; font-size: 13px;
      appearance: none; cursor: pointer; outline: none; font-family: inherit;
    }
    .kin-br-select-wrap::after {
      content: ''; position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      border: 5px solid transparent; border-top-color: rgba(255,255,255,0.4); margin-top: 3px;
    }
    .kin-br-ta {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 10px 12px; color: #fff; font-size: 13px; font-family: inherit;
      resize: none; outline: none; box-sizing: border-box;
    }
    .kin-br-ta::placeholder { color: rgba(255,255,255,0.25); }
    .kin-br-anon { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .kin-br-anon-text div:first-child { color: #fff; font-size: 13px; }
    .kin-br-anon-text div:last-child  { color: rgba(255,255,255,0.35); font-size: 11px; margin-top: 2px; }
    .kin-br-toggle {
      width: 44px !important; height: 26px !important; border-radius: 99px;
      background: #5b5ef4; border: none; cursor: pointer;
      position: relative; transition: background 0.2s; flex: none !important; min-height: 0 !important;
    }
    .kin-br-toggle::after {
      content: ''; position: absolute; top: 3px; left: calc(100% - 23px);
      width: 20px; height: 20px; border-radius: 50%; background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3); transition: left 0.2s;
    }
    .kin-br-toggle.off { background: rgba(255,255,255,0.1); }
    .kin-br-toggle.off::after { left: 3px; }
    .kin-br-extras { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
    .kin-br-input {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 10px 12px; color: #fff; font-size: 13px;
      font-family: inherit; outline: none; width: 100%; box-sizing: border-box;
    }
    .kin-br-input::placeholder { color: rgba(255,255,255,0.25); }
    .kin-br-submit {
      width: 100%; padding: 13px; border-radius: 12px;
      background: #5b5ef4; border: none; color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
      letter-spacing: 0.02em;
    }
    .kin-br-success { text-align: center; padding: 28px 0 8px; }
    .kin-br-success svg { display: block; margin: 0 auto 16px; }
    .kin-br-success h3 { color: #fff; font-size: 17px; font-weight: 600; margin: 0 0 8px; }
    .kin-br-success p  { color: rgba(255,255,255,0.4); font-size: 13px; line-height: 1.5; margin: 0 0 28px; }
    .kin-br-done {
      padding: 11px 32px; border-radius: 10px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7); font-size: 13px; cursor: pointer; font-family: inherit;
    }
  </style>

  <!-- Backdrop -->
  <div id="kin-bug-backdrop"></div>

  <!-- Bug report sheet -->
  <div id="kin-bug-sheet">
    <div id="kin-br-form-view">
      <div class="kin-br-handle"><div></div></div>
      <div class="kin-br-head">
        <div>
          <h2>Report an issue</h2>
          <p>KIN-008 — Flashcards</p>
        </div>
        <button class="kin-br-close" id="kin-bug-close" aria-label="Close">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="kin-br-form">
        <div class="kin-br-field">
          <label class="kin-br-label">Type</label>
          <div class="kin-br-select-wrap">
            <select name="type">
              <option value="bug">🐛 Bug — something isn't working</option>
              <option value="suggestion">💡 Suggestion — an idea or request</option>
              <option value="other">💬 Other</option>
            </select>
          </div>
        </div>
        <div class="kin-br-field">
          <label class="kin-br-label">What happened?</label>
          <textarea class="kin-br-ta" name="description" rows="3" placeholder="Describe the issue or idea…" required></textarea>
        </div>
        <div class="kin-br-anon">
          <div class="kin-br-anon-text">
            <div>Send anonymously</div>
            <div>No name or email needed</div>
          </div>
          <button type="button" class="kin-br-toggle" id="kin-br-anon-toggle" aria-pressed="true"></button>
        </div>
        <div class="kin-br-extras" id="kin-br-extras" style="display:none">
          <input class="kin-br-input" type="text" name="name" placeholder="Your name (optional)">
          <input class="kin-br-input" type="email" name="email" placeholder="Email for follow-up (optional)">
        </div>
        <button type="submit" class="kin-br-submit">Send report</button>
      </form>
    </div>
    <div id="kin-br-success-view" style="display:none">
      <div class="kin-br-handle"><div></div></div>
      <div class="kin-br-success">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" stroke="#2ea043" stroke-width="1.5"/><path d="M7 12.5l3.5 3.5L17 9" stroke="#2ea043" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <h3>Thanks for the report</h3>
        <p>We'll take a look. Your feedback<br>helps make Kin better for everyone.</p>
        <button class="kin-br-done" id="kin-br-done">Done</button>
      </div>
    </div>
  </div>

  <script>
  (function() {
    var btn      = document.getElementById('kin-bug-btn');
    var backdrop = document.getElementById('kin-bug-backdrop');
    var sheet    = document.getElementById('kin-bug-sheet');
    var closeBtn = document.getElementById('kin-bug-close');
    var doneBtn  = document.getElementById('kin-br-done');
    var form     = document.getElementById('kin-br-form');
    var formView = document.getElementById('kin-br-form-view');
    var successView = document.getElementById('kin-br-success-view');
    var anonToggle = document.getElementById('kin-br-anon-toggle');
    var extras   = document.getElementById('kin-br-extras');
    var anon     = true;

    function openSheet() {
      backdrop.classList.add('open');
      sheet.style.display = 'block';
      requestAnimationFrame(function() { sheet.classList.add('open'); });
    }
    function closeSheet() {
      sheet.classList.remove('open');
      setTimeout(function() {
        sheet.style.display = 'none';
        backdrop.classList.remove('open');
        form.reset();
        formView.style.display = 'block';
        successView.style.display = 'none';
        anon = true;
        anonToggle.classList.remove('off');
        extras.style.display = 'none';
      }, 300);
    }

    btn.addEventListener('click', openSheet);
    backdrop.addEventListener('click', closeSheet);
    closeBtn.addEventListener('click', closeSheet);
    doneBtn.addEventListener('click', closeSheet);

    anonToggle.addEventListener('click', function() {
      anon = !anon;
      anonToggle.classList.toggle('off', !anon);
      extras.style.display = anon ? 'none' : 'flex';
    });

    var SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxBRGfOmtQUxyaBGjYVj2mtKinI7qlGm1v921K49TiBDP5RUY9CWK_M-vpLCm2HWJxhuA/exec';

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var data = new FormData(form);
      var typeRaw = data.get('type') || '';
      var formType = 'bug';
      if (typeRaw.toLowerCase().indexOf('feature') !== -1) formType = 'idea';
      else if (typeRaw.toLowerCase().indexOf('other') !== -1) formType = 'app_suggestion';
      fetch(SHEETS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          form_type: formType,
          subject: 'KIN-008 — Flashcards',
          app: 'KIN-008',
          type: typeRaw,
          description: data.get('description') || '',
          name: anon ? 'Anonymous' : (data.get('name') || 'Not provided'),
          email: anon ? 'Anonymous' : (data.get('email') || 'Not provided')
        })
      }).catch(function() {});
      formView.style.display = 'none';
      successView.style.display = 'block';
    });
  })();
  </script>
</body>
</html>

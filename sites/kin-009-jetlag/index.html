<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jet Lag Planner — KIN-009</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KIN-009">
  <link rel="apple-touch-icon" id="apple-touch-icon">
  <meta name="description" content="Free jet lag planner. Generate a circadian adjustment plan for any flight. No accounts, no tracking." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b24;
      --surface2: #1e2530;
      --surface3: #242d3a;
      --border:   #2a3241;
      --accent:   #4a7fa5;
      --accent2:  #6aa3c8;
      --text:     #e2e8f0;
      --muted:    #6b7c93;
      --green:    #3ecf8e;
      --amber:    #f59e0b;
      --red:      #ef4444;
      --purple:   #a78bfa;
      /* Timeline bands */
      --band-sleep:         rgba(59, 130, 246, 0.55);
      --band-sleep-label:   #bfdbfe;
      --band-sun:           rgba(234, 179, 8,  0.75);
      --band-sun-label:     #fef08a;
      --band-avoid:         rgba(239, 68,  68, 0.5);
      --band-avoid-label:   #fca5a5;
      --band-fatigue:       rgba(239, 68,  68, 0.85);
      --band-fatigue-label: #ffffff;
      /* Cards */
      --fatigue-bg: #1c0f0f; --fatigue-border: #5a2020; --fatigue-body: #d4a0a0;
      --sun-bg:     #1a1508; --sun-border:     #5a4010; --sun-body:     #c4a060;
      --arrival-bg: #0f1d2e; --today-bg:       #0d2214;
    }

    html.light {
      --bg:       #f0f4f8;
      --surface:  #ffffff;
      --surface2: #f1f5f9;
      --surface3: #e8edf4;
      --border:   #cbd5e1;
      --accent:   #2563eb;
      --accent2:  #1d4ed8;
      --text:     #1e293b;
      --muted:    #64748b;
      --green:    #059669;
      --amber:    #d97706;
      --red:      #dc2626;
      /* Timeline bands */
      --band-sleep:         rgba(37, 99,  235, 0.2);
      --band-sleep-label:   #1d4ed8;
      --band-sun:           rgba(202, 138, 4,  0.22);
      --band-sun-label:     #92400e;
      --band-avoid:         rgba(220, 38,  38, 0.18);
      --band-avoid-label:   #991b1b;
      --band-fatigue:       rgba(220, 38,  38, 0.28);
      --band-fatigue-label: #7f1d1d;
      /* Cards */
      --fatigue-bg: #fff5f5; --fatigue-border: #fca5a5; --fatigue-body: #7f1d1d;
      --sun-bg:     #fffbeb; --sun-border:     #fde68a; --sun-body:     #78350f;
      --arrival-bg: #eff6ff; --today-bg:       #f0fdf4;
    }

    html, body { min-height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 15px; line-height: 1.5;
    }

    /* ── Header ──────────────────────────────── */
    .kin-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 20; background: var(--bg);
    }
    .brand-name { font-size: 17px; font-weight: 500; }
    .brand-sub  { font-size: 10px; color: var(--muted); letter-spacing: 0.12em; }
    .kin-badge  {
      font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
      color: var(--accent); border: 1px solid var(--accent);
      border-radius: 4px; padding: 2px 7px;
    }

    /* ── Layout ──────────────────────────────── */
    .page { max-width: 680px; margin: 0 auto; padding: 24px 20px 48px; }

    /* ── Form ────────────────────────────────── */
    .form-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 22px;
    }
    .form-card h2 { font-size: 16px; font-weight: 500; margin-bottom: 18px; color: var(--muted); }

    .form-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
      margin-bottom: 14px;
    }
    @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; color: var(--muted); text-transform: uppercase; }
    select, input[type="time"] {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      color: var(--text); font: inherit; font-size: 14px; outline: none;
      transition: border-color 0.15s; width: 100%;
      appearance: none; -webkit-appearance: none;
      cursor: pointer;
    }
    select:focus, input[type="time"]:focus { border-color: var(--accent); }
    select option { background: var(--surface2); }

    .optional-toggle {
      font-size: 13px; color: var(--accent2); cursor: pointer;
      margin-bottom: 12px; display: inline-block;
    }
    .optional-section { margin-bottom: 14px; }

    .btn-generate {
      width: 100%; padding: 14px; border-radius: 10px;
      background: var(--accent); color: #fff; border: none;
      font: inherit; font-size: 15px; font-weight: 600;
      cursor: pointer; letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-generate:hover  { background: var(--accent2); }
    .btn-generate:active { transform: scale(0.98); }

    /* ── Section headings ─────────────────────── */
    .section { margin-top: 28px; }
    .section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
      color: var(--muted); text-transform: uppercase; margin-bottom: 12px;
    }

    /* ── Summary banner ──────────────────────── */
    .summary-banner {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 20px;
      display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
    }
    .summary-item { display: flex; flex-direction: column; gap: 3px; }
    .summary-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .summary-value { font-size: 20px; font-weight: 600; }
    .summary-divider { width: 1px; height: 36px; background: var(--border); }
    .diff-low      { color: var(--green); }
    .diff-moderate { color: var(--amber); }
    .diff-high     { color: var(--red); }
    .direction-arrow { font-size: 18px; }

    /* ── Timeline ────────────────────────────── */
    .timeline-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px; overflow-x: auto;
    }
    .timeline-row { margin-bottom: 10px; }
    .timeline-label {
      font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 6px;
      letter-spacing: 0.04em;
    }
    .timeline-sublabel {
      font-size: 10px; color: var(--muted); font-weight: 400;
    }
    .timeline-track {
      position: relative; height: 44px; border-radius: 8px;
      background: var(--surface2); min-width: 600px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .timeline-band {
      position: absolute; top: 0; height: 100%;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .band-sleep   { background: var(--band-sleep); }
    .band-sun     { background: var(--band-sun); }
    .band-avoid   { background: var(--band-avoid); }
    .band-fatigue { background: var(--band-fatigue); border-right: 2px solid var(--red); border-left: 2px solid var(--red); }
    .band-label {
      font-size: 10px; font-weight: 700; white-space: nowrap;
      letter-spacing: 0.04em; pointer-events: none; padding: 0 4px;
    }
    .band-sleep   .band-label { color: var(--band-sleep-label); }
    .band-sun     .band-label { color: var(--band-sun-label); }
    .band-avoid   .band-label { color: var(--band-avoid-label); }
    .band-fatigue .band-label { color: var(--band-fatigue-label); }
    .timeline-hours {
      display: flex; min-width: 600px; margin-top: 3px;
    }
    .timeline-hour {
      flex: 1; text-align: center; font-size: 10px; color: var(--muted);
      border-left: 1px solid var(--border); padding-top: 2px;
      min-width: 0;
    }
    .timeline-hour:first-child { border-left: none; }

    .legend {
      display: flex; gap: 14px; flex-wrap: wrap; margin-top: 14px;
    }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

    /* ── Fatigue warning ─────────────────────── */
    .fatigue-card {
      background: var(--fatigue-bg); border: 1px solid var(--fatigue-border);
      border-radius: 12px; padding: 16px 18px;
      display: flex; gap: 14px; align-items: flex-start;
    }
    .fatigue-icon { font-size: 22px; flex-shrink: 0; line-height: 1; margin-top: 2px; }
    .fatigue-title { font-size: 14px; font-weight: 600; color: var(--red); margin-bottom: 4px; }
    .fatigue-body  { font-size: 13px; color: var(--fatigue-body); line-height: 1.5; }

    /* ── Sunlight card ───────────────────────── */
    .sunlight-card {
      background: var(--sun-bg); border: 1px solid var(--sun-border);
      border-radius: 12px; padding: 16px 18px;
      display: flex; gap: 14px; align-items: flex-start;
    }
    .sunlight-icon  { font-size: 22px; flex-shrink: 0; line-height: 1; margin-top: 2px; }
    .sunlight-title { font-size: 14px; font-weight: 600; color: var(--amber); margin-bottom: 4px; }
    .sunlight-body  { font-size: 13px; color: var(--sun-body); line-height: 1.5; }

    /* ── Day plan cards ──────────────────────── */
    .day-cards { display: flex; flex-direction: column; gap: 10px; }
    .day-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
    }
    .day-card.arrival {
      background: var(--arrival-bg); border-color: var(--accent);
    }
    .day-card.today {
      background: var(--today-bg); border-color: var(--green);
    }
    .day-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .day-label {
      font-size: 13px; font-weight: 700; letter-spacing: 0.04em;
      color: var(--muted);
    }
    .day-card.arrival .day-label { color: var(--accent2); }
    .day-card.today   .day-label { color: var(--green); }
    .day-badge {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      padding: 2px 8px; border-radius: 4px;
      background: var(--surface2); color: var(--muted);
    }
    .day-card.arrival .day-badge { background: #1a3348; color: var(--accent2); }
    .day-actions { display: flex; flex-direction: column; gap: 7px; }
    .day-action {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 13px; line-height: 1.4;
    }
    .day-action-icon { font-size: 15px; flex-shrink: 0; line-height: 1.4; }

    /* ── Strategy card ───────────────────────── */
    .strategy-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px; font-size: 14px; line-height: 1.6;
    }
    .strategy-card strong { color: var(--text); }

    /* ── Save button ─────────────────────────── */
    .btn-save {
      width: 100%; padding: 13px; border-radius: 10px; margin-top: 8px;
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); font: inherit; font-size: 14px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .btn-save:hover { border-color: var(--accent); }

    /* ── Mode toggle ─────────────────────────── */
    .btn-mode {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px; cursor: pointer;
      font: inherit; font-size: 13px; color: var(--muted);
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-mode:hover { border-color: var(--accent); color: var(--text); }

    /* Light-mode input chrome fix */
    html.light select, html.light input[type="time"] { color-scheme: light; }
    html:not(.light) select, html:not(.light) input[type="time"] { color-scheme: dark; }

    /* ── Print layout ─────────────────────────── */
    @media print {
      .kin-header, .form-card, .btn-save, .btn-generate, .optional-toggle { display: none !important; }
      body { background: white; color: black; }
      .summary-banner, .day-card, .fatigue-card, .sunlight-card {
        border: 1px solid #ccc !important; background: #fafafa !important;
        break-inside: avoid;
      }
    }

    #results { display: none; }
  </style>
</head>
<body>

<header class="kin-header">
  <footer style="text-align:center;padding:16px 16px 48px;font-family:-apple-system,sans-serif;font-size:11px;letter-spacing:0.04em;color:#9a8b7e">
  KIN-009 · <a href="https://kintools.netlify.app/" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">Kin Tools</a> · by Darren

  <div style="display:flex;justify-content:center;margin-top:8px"><span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:rgba(46,160,67,0.1);border:1px solid rgba(46,160,67,0.25);font-size:10px;font-weight:600;letter-spacing:0.08em;color:#2ea043;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"><svg width="9" height="11" viewBox="0 0 9 11" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.5 0.5L0.5 2.25V5.25C0.5 7.75 2.25 10.05 4.5 10.5C6.75 10.05 8.5 7.75 8.5 5.25V2.25L4.5 0.5Z" fill="#2ea043" fill-opacity="0.15" stroke="#2ea043" stroke-width="0.75"/><path d="M2.5 5.5L3.75 6.75L6.5 4" stroke="#2ea043" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>Local Only · Verified</span></div>

  <div style="margin-top:10px"><button id="kin-bug-btn" style="background:none;border:none;padding:0;color:inherit;font:inherit;opacity:0.4;font-size:11px;cursor:pointer;letter-spacing:0.04em;text-decoration:underline;text-underline-offset:3px;">Report a bug</button></div>
</footer>

  <!-- ── Bug report ──────────────────────────────────────────────── -->
  <style>
    #kin-bug-backdrop {
      display: none; position: fixed; inset: 0; z-index: 901;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(2px);
    }
    #kin-bug-sheet {
      display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 902;
      background: #17171f;
      border-radius: 20px 20px 0 0;
      border: 1px solid rgba(255,255,255,0.08); border-bottom: none;
      padding: 0 20px 40px;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    #kin-bug-sheet.open { transform: translateY(0); }
    #kin-bug-backdrop.open { display: block; }
    .kin-br-handle { display: flex; justify-content: center; padding: 12px 0 4px; }
    .kin-br-handle div { width: 36px; height: 4px; border-radius: 99px; background: rgba(255,255,255,0.15); }
    .kin-br-head { display: flex; align-items: center; justify-content: space-between; margin: 8px 0 20px; }
    .kin-br-head h2 { color: #fff; font-size: 16px; font-weight: 600; margin: 0; }
    .kin-br-head p  { color: rgba(255,255,255,0.35); font-size: 11px; margin: 3px 0 0; letter-spacing: 0.04em; }
    .kin-br-close {
      width: 30px !important; height: 30px !important; border-radius: 50%;
      background: rgba(255,255,255,0.07); border: none;
      color: rgba(255,255,255,0.5); cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex: none !important; min-height: 0 !important;
    }
    .kin-br-label { display: block; color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 7px; }
    .kin-br-field { margin-bottom: 14px; }
    .kin-br-select-wrap { position: relative; }
    .kin-br-select-wrap select {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 10px 36px 10px 12px; color: #fff; font-size: 13px;
      appearance: none; cursor: pointer; outline: none; font-family: inherit;
    }
    .kin-br-select-wrap::after {
      content: ''; position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      border: 5px solid transparent; border-top-color: rgba(255,255,255,0.4); margin-top: 3px;
    }
    .kin-br-ta {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 10px 12px; color: #fff; font-size: 13px; font-family: inherit;
      resize: none; outline: none; box-sizing: border-box;
    }
    .kin-br-ta::placeholder { color: rgba(255,255,255,0.25); }
    .kin-br-anon { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .kin-br-anon-text div:first-child { color: #fff; font-size: 13px; }
    .kin-br-anon-text div:last-child  { color: rgba(255,255,255,0.35); font-size: 11px; margin-top: 2px; }
    .kin-br-toggle {
      width: 44px !important; height: 26px !important; border-radius: 99px;
      background: #5b5ef4; border: none; cursor: pointer;
      position: relative; transition: background 0.2s; flex: none !important; min-height: 0 !important;
    }
    .kin-br-toggle::after {
      content: ''; position: absolute; top: 3px; left: calc(100% - 23px);
      width: 20px; height: 20px; border-radius: 50%; background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3); transition: left 0.2s;
    }
    .kin-br-toggle.off { background: rgba(255,255,255,0.1); }
    .kin-br-toggle.off::after { left: 3px; }
    .kin-br-extras { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
    .kin-br-input {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 10px 12px; color: #fff; font-size: 13px;
      font-family: inherit; outline: none; width: 100%; box-sizing: border-box;
    }
    .kin-br-input::placeholder { color: rgba(255,255,255,0.25); }
    .kin-br-submit {
      width: 100%; padding: 13px; border-radius: 12px;
      background: #5b5ef4; border: none; color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
      letter-spacing: 0.02em;
    }
    .kin-br-success { text-align: center; padding: 28px 0 8px; }
    .kin-br-success svg { display: block; margin: 0 auto 16px; }
    .kin-br-success h3 { color: #fff; font-size: 17px; font-weight: 600; margin: 0 0 8px; }
    .kin-br-success p  { color: rgba(255,255,255,0.4); font-size: 13px; line-height: 1.5; margin: 0 0 28px; }
    .kin-br-done {
      padding: 11px 32px; border-radius: 10px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7); font-size: 13px; cursor: pointer; font-family: inherit;
    }
  </style>

  <!-- Backdrop -->
  <div id="kin-bug-backdrop"></div>

  <!-- Bug report sheet -->
  <div id="kin-bug-sheet">
    <div id="kin-br-form-view">
      <div class="kin-br-handle"><div></div></div>
      <div class="kin-br-head">
        <div>
          <h2>Report an issue</h2>
          <p>KIN-009 — Jet Lag Planner</p>
        </div>
        <button class="kin-br-close" id="kin-bug-close" aria-label="Close">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="kin-br-form">
        <div class="kin-br-field">
          <label class="kin-br-label">Type</label>
          <div class="kin-br-select-wrap">
            <select name="type">
              <option value="bug">🐛 Bug — something isn't working</option>
              <option value="suggestion">💡 Suggestion — an idea or request</option>
              <option value="other">💬 Other</option>
            </select>
          </div>
        </div>
        <div class="kin-br-field">
          <label class="kin-br-label">What happened?</label>
          <textarea class="kin-br-ta" name="description" rows="3" placeholder="Describe the issue or idea…" required></textarea>
        </div>
        <div class="kin-br-anon">
          <div class="kin-br-anon-text">
            <div>Send anonymously</div>
            <div>No name or email needed</div>
          </div>
          <button type="button" class="kin-br-toggle" id="kin-br-anon-toggle" aria-pressed="true"></button>
        </div>
        <div class="kin-br-extras" id="kin-br-extras" style="display:none">
          <input class="kin-br-input" type="text" name="name" placeholder="Your name (optional)">
          <input class="kin-br-input" type="email" name="email" placeholder="Email for follow-up (optional)">
        </div>
        <button type="submit" class="kin-br-submit">Send report</button>
      </form>
    </div>
    <div id="kin-br-success-view" style="display:none">
      <div class="kin-br-handle"><div></div></div>
      <div class="kin-br-success">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" stroke="#2ea043" stroke-width="1.5"/><path d="M7 12.5l3.5 3.5L17 9" stroke="#2ea043" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <h3>Thanks for the report</h3>
        <p>We'll take a look. Your feedback<br>helps make Kin better for everyone.</p>
        <button class="kin-br-done" id="kin-br-done">Done</button>
      </div>
    </div>
  </div>

  <script>
  (function() {
    var btn      = document.getElementById('kin-bug-btn');
    var backdrop = document.getElementById('kin-bug-backdrop');
    var sheet    = document.getElementById('kin-bug-sheet');
    var closeBtn = document.getElementById('kin-bug-close');
    var doneBtn  = document.getElementById('kin-br-done');
    var form     = document.getElementById('kin-br-form');
    var formView = document.getElementById('kin-br-form-view');
    var successView = document.getElementById('kin-br-success-view');
    var anonToggle = document.getElementById('kin-br-anon-toggle');
    var extras   = document.getElementById('kin-br-extras');
    var anon     = true;

    function openSheet() {
      backdrop.classList.add('open');
      sheet.style.display = 'block';
      requestAnimationFrame(function() { sheet.classList.add('open'); });
    }
    function closeSheet() {
      sheet.classList.remove('open');
      setTimeout(function() {
        sheet.style.display = 'none';
        backdrop.classList.remove('open');
        form.reset();
        formView.style.display = 'block';
        successView.style.display = 'none';
        anon = true;
        anonToggle.classList.remove('off');
        extras.style.display = 'none';
      }, 300);
    }

    btn.addEventListener('click', openSheet);
    backdrop.addEventListener('click', closeSheet);
    closeBtn.addEventListener('click', closeSheet);
    doneBtn.addEventListener('click', closeSheet);

    anonToggle.addEventListener('click', function() {
      anon = !anon;
      anonToggle.classList.toggle('off', !anon);
      extras.style.display = anon ? 'none' : 'flex';
    });

    var SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxBRGfOmtQUxyaBGjYVj2mtKinI7qlGm1v921K49TiBDP5RUY9CWK_M-vpLCm2HWJxhuA/exec';

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var data = new FormData(form);
      var typeRaw = data.get('type') || '';
      var formType = 'bug';
      if (typeRaw.toLowerCase().indexOf('feature') !== -1) formType = 'idea';
      else if (typeRaw.toLowerCase().indexOf('other') !== -1) formType = 'app_suggestion';
      fetch(SHEETS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          form_type: formType,
          subject: 'KIN-009 — Jet Lag Planner',
          app: 'KIN-009',
          type: typeRaw,
          description: data.get('description') || '',
          name: anon ? 'Anonymous' : (data.get('name') || 'Not provided'),
          email: anon ? 'Anonymous' : (data.get('email') || 'Not provided')
        })
      }).catch(function() {});
      formView.style.display = 'none';
      successView.style.display = 'block';
    });
  })();
  </script>
</body>
</html>

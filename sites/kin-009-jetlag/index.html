<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jet Lag Planner — KIN-009</title>
  <meta name="description" content="Free jet lag planner. Generate a circadian adjustment plan for any flight. No accounts, no tracking." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b24;
      --surface2: #1e2530;
      --surface3: #242d3a;
      --border:   #2a3241;
      --accent:   #4a7fa5;
      --accent2:  #6aa3c8;
      --text:     #e2e8f0;
      --muted:    #6b7c93;
      --green:    #3ecf8e;
      --amber:    #f59e0b;
      --red:      #ef4444;
      --purple:   #a78bfa;
    }

    html, body { min-height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 15px; line-height: 1.5;
    }

    /* ── Header ──────────────────────────────── */
    .kin-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 20; background: var(--bg);
    }
    .brand-name { font-size: 17px; font-weight: 500; }
    .brand-sub  { font-size: 10px; color: var(--muted); letter-spacing: 0.12em; }
    .kin-badge  {
      font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
      color: var(--accent); border: 1px solid var(--accent);
      border-radius: 4px; padding: 2px 7px;
    }

    /* ── Layout ──────────────────────────────── */
    .page { max-width: 680px; margin: 0 auto; padding: 24px 20px 48px; }

    /* ── Form ────────────────────────────────── */
    .form-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 22px;
    }
    .form-card h2 { font-size: 16px; font-weight: 500; margin-bottom: 18px; color: var(--muted); }

    .form-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
      margin-bottom: 14px;
    }
    @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; color: var(--muted); text-transform: uppercase; }
    select, input[type="time"] {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      color: var(--text); font: inherit; font-size: 14px; outline: none;
      transition: border-color 0.15s; width: 100%;
      appearance: none; -webkit-appearance: none;
      cursor: pointer;
    }
    select:focus, input[type="time"]:focus { border-color: var(--accent); }
    select option { background: var(--surface2); }

    .optional-toggle {
      font-size: 13px; color: var(--accent2); cursor: pointer;
      margin-bottom: 12px; display: inline-block;
    }
    .optional-section { margin-bottom: 14px; }

    .btn-generate {
      width: 100%; padding: 14px; border-radius: 10px;
      background: var(--accent); color: #fff; border: none;
      font: inherit; font-size: 15px; font-weight: 600;
      cursor: pointer; letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-generate:hover  { background: var(--accent2); }
    .btn-generate:active { transform: scale(0.98); }

    /* ── Section headings ─────────────────────── */
    .section { margin-top: 28px; }
    .section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
      color: var(--muted); text-transform: uppercase; margin-bottom: 12px;
    }

    /* ── Summary banner ──────────────────────── */
    .summary-banner {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 20px;
      display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
    }
    .summary-item { display: flex; flex-direction: column; gap: 3px; }
    .summary-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .summary-value { font-size: 20px; font-weight: 600; }
    .summary-divider { width: 1px; height: 36px; background: var(--border); }
    .diff-low      { color: var(--green); }
    .diff-moderate { color: var(--amber); }
    .diff-high     { color: var(--red); }
    .direction-arrow { font-size: 18px; }

    /* ── Timeline ────────────────────────────── */
    .timeline-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px; overflow-x: auto;
    }
    .timeline-row { margin-bottom: 10px; }
    .timeline-label {
      font-size: 11px; color: var(--muted); margin-bottom: 4px;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .timeline-track {
      position: relative; height: 36px; border-radius: 6px;
      background: var(--surface2); min-width: 560px; overflow: hidden;
    }
    .timeline-band {
      position: absolute; top: 0; height: 100%;
      border-radius: 3px; opacity: 0.85;
    }
    .band-sleep   { background: #1e3a5f; }
    .band-sun     { background: #78350f; }
    .band-avoid   { background: #3b0f0f; }
    .band-fatigue { background: #5c1a1a; border: 1px solid var(--red); opacity: 1; }
    .timeline-hours {
      display: flex; min-width: 560px; margin-top: 4px;
    }
    .timeline-hour {
      flex: 1; text-align: center; font-size: 10px; color: var(--muted);
      border-left: 1px solid var(--border); padding-top: 2px;
      min-width: 0;
    }
    .timeline-hour:first-child { border-left: none; }
    .timeline-hour.now { color: var(--accent2); font-weight: 600; }

    .legend {
      display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* ── Fatigue warning ─────────────────────── */
    .fatigue-card {
      background: #1c0f0f; border: 1px solid #3d1515;
      border-radius: 12px; padding: 16px 18px;
      display: flex; gap: 14px; align-items: flex-start;
    }
    .fatigue-icon { font-size: 22px; flex-shrink: 0; line-height: 1; margin-top: 2px; }
    .fatigue-title { font-size: 14px; font-weight: 600; color: var(--red); margin-bottom: 4px; }
    .fatigue-body  { font-size: 13px; color: #d4a0a0; line-height: 1.5; }

    /* ── Sunlight card ───────────────────────── */
    .sunlight-card {
      background: #1a1508; border: 1px solid #3d2e0f;
      border-radius: 12px; padding: 16px 18px;
      display: flex; gap: 14px; align-items: flex-start;
    }
    .sunlight-icon  { font-size: 22px; flex-shrink: 0; line-height: 1; margin-top: 2px; }
    .sunlight-title { font-size: 14px; font-weight: 600; color: var(--amber); margin-bottom: 4px; }
    .sunlight-body  { font-size: 13px; color: #c4a060; line-height: 1.5; }

    /* ── Day plan cards ──────────────────────── */
    .day-cards { display: flex; flex-direction: column; gap: 10px; }
    .day-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
    }
    .day-card.arrival {
      background: #0f1d2e; border-color: var(--accent);
    }
    .day-card.today {
      background: #0d2214; border-color: var(--green);
    }
    .day-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .day-label {
      font-size: 13px; font-weight: 700; letter-spacing: 0.04em;
      color: var(--muted);
    }
    .day-card.arrival .day-label { color: var(--accent2); }
    .day-card.today   .day-label { color: var(--green); }
    .day-badge {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      padding: 2px 8px; border-radius: 4px;
      background: var(--surface2); color: var(--muted);
    }
    .day-card.arrival .day-badge { background: #1a3348; color: var(--accent2); }
    .day-actions { display: flex; flex-direction: column; gap: 7px; }
    .day-action {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 13px; line-height: 1.4;
    }
    .day-action-icon { font-size: 15px; flex-shrink: 0; line-height: 1.4; }

    /* ── Strategy card ───────────────────────── */
    .strategy-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px; font-size: 14px; line-height: 1.6;
    }
    .strategy-card strong { color: var(--text); }

    /* ── Save button ─────────────────────────── */
    .btn-save {
      width: 100%; padding: 13px; border-radius: 10px; margin-top: 8px;
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); font: inherit; font-size: 14px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .btn-save:hover { border-color: var(--accent); }

    /* ── Print layout ─────────────────────────── */
    @media print {
      .kin-header, .form-card, .btn-save, .btn-generate, .optional-toggle { display: none !important; }
      body { background: white; color: black; }
      .summary-banner, .day-card, .fatigue-card, .sunlight-card {
        border: 1px solid #ccc !important; background: #fafafa !important;
        break-inside: avoid;
      }
    }

    #results { display: none; }
  </style>
</head>
<body>

<header class="kin-header">
  <div>
    <div class="brand-name">Jet Lag Planner</div>
    <div class="brand-sub">KIN-009 · <span style="text-transform:none">d</span>Bridge</div>
  </div>
  <span class="kin-badge">KIN-009</span>
</header>

<div class="page">

  <!-- ── FORM ─────────────────────────────────── -->
  <div class="form-card">
    <h2>Your Flight</h2>

    <div class="form-grid">
      <div class="field">
        <label>Origin Time Zone</label>
        <select id="sel-origin"></select>
      </div>
      <div class="field">
        <label>Destination Time Zone</label>
        <select id="sel-dest"></select>
      </div>
      <div class="field">
        <label>Departure Time <span style="color:var(--muted);font-weight:400">(optional)</span></label>
        <input type="time" id="inp-departure" value="08:00" />
      </div>
      <div class="field">
        <label>Arrival Time (local)</label>
        <input type="time" id="inp-arrival" value="14:00" />
      </div>
    </div>

    <span class="optional-toggle" id="toggle-optional">＋ Add sleep schedule (optional)</span>

    <div class="optional-section" id="optional-section" style="display:none">
      <div class="form-grid">
        <div class="field">
          <label>Usual Sleep Time</label>
          <input type="time" id="inp-sleep" value="23:00" />
        </div>
        <div class="field">
          <label>Usual Wake Time</label>
          <input type="time" id="inp-wake" value="07:00" />
        </div>
      </div>
    </div>

    <button class="btn-generate" id="btn-generate">Generate Plan</button>
  </div>

  <!-- ── RESULTS ─────────────────────────────── -->
  <div id="results">

    <div class="section">
      <div class="section-title">Overview</div>
      <div class="summary-banner" id="summary-banner"></div>
    </div>

    <div class="section">
      <div class="section-title">Circadian Timeline</div>
      <div class="timeline-wrap" id="timeline-wrap"></div>
    </div>

    <div class="section" id="fatigue-section">
      <div class="section-title">Fatigue Window</div>
      <div id="fatigue-card"></div>
    </div>

    <div class="section">
      <div class="section-title">Light Exposure Strategy</div>
      <div id="sunlight-card"></div>
    </div>

    <div class="section" id="pretavel-section" style="display:none">
      <div class="section-title">Pre-Travel Adjustment</div>
      <div class="day-cards" id="pre-cards"></div>
    </div>

    <div class="section">
      <div class="section-title">Post-Arrival Plan</div>
      <div class="day-cards" id="post-cards"></div>
    </div>

    <div class="section" id="strategy-section" style="display:none">
      <div class="section-title">Strategy Note</div>
      <div id="strategy-card" class="strategy-card"></div>
    </div>

    <div class="section">
      <button class="btn-save" onclick="window.print()">🖨 Save / Print Plan</button>
    </div>

  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
//  TIMEZONE DATA  (UTC offset in decimal hours)
// ═══════════════════════════════════════════════════════════════
const TZ = [
  { label: 'UTC−12 · Baker Island, Howland Island',       offset: -12    },
  { label: 'UTC−11 · Pago Pago, Niue',                    offset: -11    },
  { label: 'UTC−10 · Honolulu, Hawaii',                    offset: -10    },
  { label: 'UTC−9:30 · Marquesas Islands',                 offset: -9.5   },
  { label: 'UTC−9 · Anchorage, Juneau',                    offset: -9     },
  { label: 'UTC−8 · Los Angeles, Vancouver, Seattle',      offset: -8     },
  { label: 'UTC−7 · Denver, Phoenix, Calgary',             offset: -7     },
  { label: 'UTC−6 · Chicago, Mexico City, Winnipeg',       offset: -6     },
  { label: 'UTC−5 · New York, Toronto, Miami',             offset: -5     },
  { label: 'UTC−4 · Halifax, Caracas, La Paz',             offset: -4     },
  { label: "UTC−3:30 · St. John's, Newfoundland",          offset: -3.5   },
  { label: 'UTC−3 · Brasília, Buenos Aires, Santiago',     offset: -3     },
  { label: 'UTC−2 · South Georgia Island',                 offset: -2     },
  { label: 'UTC−1 · Azores, Cape Verde',                   offset: -1     },
  { label: 'UTC±0 · London, Dublin, Lisbon, Reykjavik',    offset: 0      },
  { label: 'UTC+1 · Paris, Berlin, Rome, Madrid, Lagos',   offset: 1      },
  { label: 'UTC+2 · Cairo, Helsinki, Athens, Johannesburg',offset: 2      },
  { label: 'UTC+3 · Moscow, Riyadh, Nairobi, Baghdad',     offset: 3      },
  { label: 'UTC+3:30 · Tehran',                            offset: 3.5    },
  { label: 'UTC+4 · Dubai, Abu Dhabi, Baku',               offset: 4      },
  { label: 'UTC+4:30 · Kabul',                             offset: 4.5    },
  { label: 'UTC+5 · Karachi, Islamabad, Tashkent',         offset: 5      },
  { label: 'UTC+5:30 · Mumbai, Delhi, Kolkata, Colombo',   offset: 5.5    },
  { label: 'UTC+5:45 · Kathmandu',                         offset: 5.75   },
  { label: 'UTC+6 · Dhaka, Almaty',                        offset: 6      },
  { label: 'UTC+6:30 · Yangon (Rangoon)',                  offset: 6.5    },
  { label: 'UTC+7 · Bangkok, Jakarta, Ho Chi Minh City',   offset: 7      },
  { label: 'UTC+8 · Singapore, Beijing, Hong Kong, Perth', offset: 8      },
  { label: 'UTC+8:45 · Eucla, Australia',                  offset: 8.75   },
  { label: 'UTC+9 · Tokyo, Seoul, Osaka',                  offset: 9      },
  { label: 'UTC+9:30 · Adelaide, Darwin',                  offset: 9.5    },
  { label: 'UTC+10 · Sydney, Melbourne, Brisbane',         offset: 10     },
  { label: 'UTC+10:30 · Lord Howe Island',                 offset: 10.5   },
  { label: 'UTC+11 · Noumea, Honiara, Magadan',            offset: 11     },
  { label: 'UTC+12 · Auckland, Wellington, Fiji',          offset: 12     },
  { label: 'UTC+12:45 · Chatham Islands',                  offset: 12.75  },
  { label: 'UTC+13 · Nuku\'alofa, Apia',                   offset: 13     },
  { label: 'UTC+14 · Kiritimati (Line Islands)',            offset: 14     },
];

// ═══════════════════════════════════════════════════════════════
//  POPULATE DROPDOWNS
// ═══════════════════════════════════════════════════════════════
function populateSelect(id, defaultOffset) {
  const sel = document.getElementById(id);
  TZ.forEach((tz, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = tz.label;
    if (tz.offset === defaultOffset) opt.selected = true;
    sel.appendChild(opt);
  });
}

// Try to guess local offset
const localOffset = -(new Date().getTimezoneOffset() / 60);
const closestLocal = TZ.reduce((best, tz, i) =>
  Math.abs(tz.offset - localOffset) < Math.abs(TZ[best].offset - localOffset) ? i : best, 0);

populateSelect('sel-origin', TZ[closestLocal].offset);
populateSelect('sel-dest',   7); // default: Bangkok

// ═══════════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════════
function fmtHour(h) {
  h = ((h % 24) + 24) % 24;
  const hh = Math.floor(h);
  const mm = Math.round((h - hh) * 60);
  return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}

function timeToHour(str) {
  const [h, m] = str.split(':').map(Number);
  return h + m / 60;
}

// ═══════════════════════════════════════════════════════════════
//  CORE ALGORITHM
// ═══════════════════════════════════════════════════════════════
function generatePlan({ originOffset, destOffset, arrivalHour, sleepHour, wakeHour, departureHour }) {
  // delta: positive = east, negative = west
  let delta = destOffset - originOffset;
  // Normalise to shortest path
  while (delta > 12)  delta -= 24;
  while (delta < -12) delta += 24;

  if (delta === 0) return null;

  const direction  = delta > 0 ? 'east' : 'west';
  const absDelta   = Math.abs(delta);
  const shiftRate  = direction === 'east' ? 1 : 1.5;
  const adjustDays = Math.ceil(absDelta / shiftRate);

  // Difficulty
  let difficulty;
  if (absDelta <= 2) difficulty = 'low';
  else if (absDelta <= 5 || direction === 'west') difficulty = 'moderate';
  else difficulty = 'high';

  // Circadian nadir = wakeTime − 2.5h (body clock), converted to dest time
  const nadirOrigin = ((wakeHour - 2.5) + 24) % 24;
  const nadirDest   = ((nadirOrigin + delta) + 24) % 24;

  // Sunlight anchor
  const sunStart = direction === 'east' ? 7.5  : 18;
  const sunEnd   = direction === 'east' ? 10   : 20.5;

  // Avoid light window (opposite of sunlight)
  const avoidStart = direction === 'east' ? 19  : 6;
  const avoidEnd   = direction === 'east' ? 23  : 9.5;

  // Sleep window (destination)
  const sleepDest = ((sleepHour + delta) + 24) % 24;
  const wakeDest  = ((wakeHour  + delta) + 24) % 24;

  // Pre-travel plan (up to 3 days)
  const preDays = Math.min(3, adjustDays - 1);
  const prePlan = [];
  for (let i = preDays; i >= 1; i--) {
    const shift = (preDays - i + 1) * shiftRate;
    const newSleep = direction === 'east'
      ? fmtHour(sleepHour - shift)
      : fmtHour(sleepHour + shift);
    const newWake = direction === 'east'
      ? fmtHour(wakeHour - shift)
      : fmtHour(wakeHour + shift);

    prePlan.push({
      label: `Day −${i}`,
      badge: `${shift >= 1 ? Math.round(shift) : shift} hr${shift !== 1 ? 's' : ''} adjusted`,
      actions: [
        { icon: '🌙', text: `Sleep at ${newSleep} · Wake at ${newWake}` },
        direction === 'east'
          ? { icon: '☀️', text: 'Seek morning sunlight · Avoid screens after 21:00' }
          : { icon: '💡', text: 'Use bright light in the evening (18:00–21:00)' },
        { icon: '☕', text: 'Limit caffeine after 14:00' },
      ],
    });
  }

  // Post-arrival plan
  const postPlan = [];

  postPlan.push({
    label: 'Arrival Day',
    badge: `Arrive ${fmtHour(arrivalHour)} local`,
    isArrival: true,
    actions: [
      { icon: '👁', text: `Stay awake until at least ${fmtHour(Math.min(22, sleepDest))} local time` },
      { icon: '🚶', text: 'Light activity — short walk, avoid long naps' },
      { icon: '💧', text: 'Hydrate well · Avoid alcohol on arrival day' },
      { icon: '☀️', text: `Seek ${direction === 'east' ? 'morning' : 'evening'} sunlight after arrival` },
    ],
  });

  const planDays = Math.min(adjustDays + 1, 6);
  for (let d = 1; d <= planDays; d++) {
    const frac = Math.min(d / adjustDays, 1);
    const adjSleep = direction === 'east'
      ? fmtHour(sleepDest - (absDelta * (1 - frac)))
      : fmtHour(sleepDest + (absDelta * (1 - frac)));

    const actions = [];
    if (direction === 'east') {
      actions.push({ icon: '☀️', text: `Sunlight ${fmtHour(sunStart)}–${fmtHour(sunEnd)} — your key reset cue` });
      actions.push({ icon: '🌙', text: `Sleep target: ${adjSleep} · Avoid bright light after ${fmtHour(avoidStart)}` });
    } else {
      actions.push({ icon: '💡', text: `Bright light ${fmtHour(sunStart)}–${fmtHour(sunEnd)} local time` });
      actions.push({ icon: '🌙', text: `Sleep target: ${adjSleep}` });
    }
    if (d === 1) actions.push({ icon: '☕', text: 'Caffeine before 14:00 only' });
    if (d >= adjustDays) actions.push({ icon: '✅', text: 'Body clock should be fully adjusted' });

    postPlan.push({
      label: `Day ${d}`,
      badge: frac >= 1 ? 'Adjusted' : `~${Math.round(frac * 100)}% shifted`,
      isToday: d === 1,
      actions,
    });
  }

  return {
    delta, direction, absDelta, difficulty, adjustDays,
    nadirDest, sunStart, sunEnd, avoidStart, avoidEnd,
    sleepDest, wakeDest, sleepHour, wakeHour,
    prePlan, postPlan,
  };
}

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════
function pct(h) {
  h = ((h % 24) + 24) % 24;
  return (h / 24 * 100).toFixed(3) + '%';
}

function bandStyle(start, end, cls) {
  start = ((start % 24) + 24) % 24;
  end   = ((end   % 24) + 24) % 24;
  if (end > start) {
    return `<div class="timeline-band ${cls}" style="left:${pct(start)};width:${pct(end - start)}"></div>`;
  } else {
    // Wraps midnight — draw two segments
    return `<div class="timeline-band ${cls}" style="left:${pct(start)};width:${pct(24 - start)}"></div>`
         + `<div class="timeline-band ${cls}" style="left:0;width:${pct(end)}"></div>`;
  }
}

function renderTimeline(p) {
  const hours = Array.from({length: 24}, (_, i) => i);
  const hourTicks = hours.map(h =>
    `<div class="timeline-hour">${h < 10 ? '0'+h : h}</div>`
  ).join('');

  // Top track — recommended target schedule (destination local time)
  // Sleep = same time of day as usual (e.g. 23:00 dest), sunlight, avoid-light
  const destBands =
    bandStyle(p.sleepHour,  p.wakeHour,  'band-sleep') +
    bandStyle(p.sunStart,   p.sunEnd,    'band-sun')   +
    bandStyle(p.avoidStart, p.avoidEnd,  'band-avoid');

  // Bottom track — body clock's CURRENT state mapped to destination time
  // (shows the mismatch: e.g. body tries to sleep 06:00–14:00 Bangkok when arriving from London)
  const bodyBands =
    bandStyle(p.sleepDest, p.wakeDest,       'band-sleep') +
    bandStyle(p.nadirDest, p.nadirDest + 2,  'band-fatigue');

  // Body clock hour labels (destination hour N = body clock hour N - delta)
  const bodyHourTicks = hours.map(h => {
    const bodyH = (((h - p.delta) % 24) + 24) % 24;
    const bh = Math.floor(bodyH);
    return `<div class="timeline-hour">${String(bh).padStart(2,'0')}</div>`;
  }).join('');

  document.getElementById('timeline-wrap').innerHTML = `
    <div class="timeline-row">
      <div class="timeline-label">Target schedule — destination local time</div>
      <div class="timeline-track">${destBands}</div>
      <div class="timeline-hours">${hourTicks}</div>
    </div>
    <div class="timeline-row" style="margin-top:16px">
      <div class="timeline-label">Your body clock — destination time &nbsp;<span style="font-size:10px;color:var(--muted)">(shows the mismatch)</span></div>
      <div class="timeline-track">${bodyBands}</div>
      <div class="timeline-hours">${bodyHourTicks}</div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#1e3a5f;opacity:1"></div> Sleep</div>
      <div class="legend-item"><div class="legend-dot" style="background:#78350f"></div> Sunlight (target)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3b0f0f"></div> Avoid bright light</div>
      <div class="legend-item"><div class="legend-dot" style="background:#5c1a1a;border:1px solid var(--red)"></div> Fatigue window (body clock)</div>
    </div>`;
}

function renderDayCards(containerId, days) {
  document.getElementById(containerId).innerHTML = days.map(d => {
    const cls = d.isArrival ? 'arrival' : d.isToday ? 'today' : '';
    const actions = d.actions.map(a =>
      `<div class="day-action"><span class="day-action-icon">${a.icon}</span><span>${a.text}</span></div>`
    ).join('');
    return `
      <div class="day-card ${cls}">
        <div class="day-card-header">
          <span class="day-label">${d.label}</span>
          ${d.badge ? `<span class="day-badge">${d.badge}</span>` : ''}
        </div>
        <div class="day-actions">${actions}</div>
      </div>`;
  }).join('');
}

function render(p, originName, destName, arrivalHour) {
  // Summary
  const diffClass = { low: 'diff-low', moderate: 'diff-moderate', high: 'diff-high' }[p.difficulty];
  const diffText  = { low: 'Low', moderate: 'Moderate', high: 'High' }[p.difficulty];
  const dirArrow  = p.direction === 'east' ? '→' : '←';
  const dirLabel  = p.direction === 'east' ? 'Eastbound' : 'Westbound';

  document.getElementById('summary-banner').innerHTML = `
    <div class="summary-item">
      <span class="summary-label">Shift</span>
      <span class="summary-value">${p.absDelta % 1 === 0 ? p.absDelta : p.absDelta.toFixed(1)} hrs</span>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item">
      <span class="summary-label">Direction</span>
      <span class="summary-value direction-arrow">${dirArrow} ${dirLabel}</span>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item">
      <span class="summary-label">Difficulty</span>
      <span class="summary-value ${diffClass}">${diffText}</span>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item">
      <span class="summary-label">Est. Adjustment</span>
      <span class="summary-value">${p.adjustDays} day${p.adjustDays !== 1 ? 's' : ''}</span>
    </div>`;

  // Timeline
  renderTimeline(p);

  // Fatigue window
  const fatLow  = fmtHour(p.nadirDest);
  const fatHigh = fmtHour(p.nadirDest + 2);
  document.getElementById('fatigue-card').innerHTML = `
    <div class="fatigue-card">
      <div class="fatigue-icon">⚠️</div>
      <div>
        <div class="fatigue-title">Fatigue Window · ${fatLow}–${fatHigh} local time</div>
        <div class="fatigue-body">
          Your body clock hits its natural low during this window — expect peak tiredness, slow reactions, and low alertness.<br>
          <strong style="color:#d4a0a0">Avoid driving</strong> · Short nap (20 min max) is fine · Hydrate and move around.
        </div>
      </div>
    </div>`;

  // Sunlight
  const sunIcon = p.direction === 'east' ? '🌅' : '🌇';
  const sunType = p.direction === 'east' ? 'Morning' : 'Evening';
  const sunExplanation = p.direction === 'east'
    ? 'Morning light shifts your body clock <em>earlier</em> — the key cue for eastbound travel.'
    : 'Evening light shifts your body clock <em>later</em> — the key cue for westbound travel.';
  document.getElementById('sunlight-card').innerHTML = `
    <div class="sunlight-card">
      <div class="sunlight-icon">${sunIcon}</div>
      <div>
        <div class="sunlight-title">${sunType} Light · ${fmtHour(p.sunStart)}–${fmtHour(p.sunEnd)} local time</div>
        <div class="sunlight-body">
          ${sunExplanation}<br>
          Aim for natural outdoor light during this window each day. If it is overcast, bright indoor light helps.
          ${p.direction === 'east' ? `<br>Avoid bright light after ${fmtHour(p.avoidStart)}.` : ''}
        </div>
      </div>
    </div>`;

  // Pre-travel
  if (p.prePlan.length) {
    document.getElementById('pretavel-section').style.display = '';
    renderDayCards('pre-cards', p.prePlan);
  }

  // Post-arrival
  renderDayCards('post-cards', p.postPlan);

  // Short-trip strategy
  // (if trip seems short relative to adjustment needed — we can't know trip length
  //  but we show a tip for high-shift trips)
  if (p.absDelta >= 6) {
    document.getElementById('strategy-section').style.display = '';
    document.getElementById('strategy-card').innerHTML = `
      <strong>Short trip?</strong> If you are staying fewer than ${p.adjustDays} days,
      consider only partially adjusting — shift by ${Math.ceil(p.absDelta / 2)} hours instead of the full ${p.absDelta % 1 === 0 ? p.absDelta : p.absDelta.toFixed(1)}.
      This avoids a full reset and makes the return journey easier on your body.`;
  }

  document.getElementById('results').style.display = '';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ═══════════════════════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════════════════════
document.getElementById('toggle-optional').addEventListener('click', function() {
  const sec = document.getElementById('optional-section');
  const hidden = sec.style.display === 'none';
  sec.style.display = hidden ? '' : 'none';
  this.textContent = hidden ? '− Hide sleep schedule' : '＋ Add sleep schedule (optional)';
});

document.getElementById('btn-generate').addEventListener('click', () => {
  const originIdx  = +document.getElementById('sel-origin').value;
  const destIdx    = +document.getElementById('sel-dest').value;
  const originTZ   = TZ[originIdx];
  const destTZ     = TZ[destIdx];
  const arrivalHour    = timeToHour(document.getElementById('inp-arrival').value   || '14:00');
  const departureHour  = timeToHour(document.getElementById('inp-departure').value || '08:00');
  const sleepHour      = timeToHour(document.getElementById('inp-sleep').value     || '23:00');
  const wakeHour       = timeToHour(document.getElementById('inp-wake').value      || '07:00');

  if (originIdx === destIdx) {
    alert('Origin and destination are the same timezone — no adjustment needed!');
    return;
  }

  const plan = generatePlan({
    originOffset: originTZ.offset,
    destOffset:   destTZ.offset,
    arrivalHour, departureHour, sleepHour, wakeHour,
  });

  if (!plan) {
    alert('No timezone difference detected.');
    return;
  }

  render(plan, originTZ.label, destTZ.label, arrivalHour);
});
</script>

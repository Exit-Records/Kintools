:root {
--bg: #f2f0EC;
--surface: #FFFFFF;
--surface-alt: #E8E6E1;
--border: #D4D1CA;
--border-focus: #1A1A1A;
--text: #1A1A1A;
--text-secondary: #6B6860;
--text-tertiary: #9B978F;
--accent: #1A1A1A;
--accent-text: #FFFFFF;
--error: #C4392D;
--error-bg: #FEF2F1;
--error-border: #F0B8B4;
--success: #2D7D46;
--type-string: #8B6914;
--type-number: #2563EB;
--type-boolean: #7C3AED;
--type-null: #9B978F;
--type-key: #1A1A1A;
--diff-add-bg: #DCFCE7;
--diff-add-text: #166534;
--diff-rm-bg: #FEE2E2;
--diff-rm-text: #991B1B;
--diff-ch-bg: #FEF9C3;
--diff-ch-text: #854D0E;
--mono: 'JetBrains Mono', monospace;
--sans: 'DM Sans', sans-serif;
--radius: 8px;
--radius-lg: 12px;
--safe-top: env(safe-area-inset-top, 0px);
--safe-bottom: env(safe-area-inset-bottom, 0px);
--safe-left: env(safe-area-inset-left, 0px);
--safe-right: env(safe-area-inset-right, 0px);
}

[data-theme="dark"] {
--bg: #131316;
--surface: #1C1C21;
--surface-alt: #26262C;
--border: #333339;
--border-focus: #A0A0A8;
--text: #E4E4E8;
--text-secondary: #9C9CA4;
--text-tertiary: #6C6C74;
--accent: #E4E4E8;
--accent-text: #131316;
--error: #F87171;
--error-bg: #2D1515;
--error-border: #7F1D1D;
--success: #4ADE80;
--type-string: #E9B308;
--type-number: #60A5FA;
--type-boolean: #A78BFA;
--type-null: #6C6C74;
--type-key: #E4E4E8;
--diff-add-bg: #14532D;
--diff-add-text: #BBF7D0;
--diff-rm-bg: #7F1D1D;
--diff-rm-text: #FECACA;
--diff-ch-bg: #713F12;
--diff-ch-text: #FEF08A;
}

body {
font-family: var(--sans);
background: var(--bg);
color: var(--text);
min-height: 100dvh;
-webkit-font-smoothing: antialiased;
padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
}

.app { max-width: 1400px; margin: 0 auto; padding: 20px 16px; }

header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 16px;
gap: 12px;
}

.logo {
font-family: var(--mono);
font-weight: 700;
font-size: 15px;
letter-spacing: 0.08em;
text-transform: uppercase;
color: var(--text);
white-space: nowrap;
}

.logo span { color: var(--text-tertiary); font-weight: 400; }

.theme-toggle {
width: 44px;
height: 44px;
min-height: 44px;
display: flex;
align-items: center;
justify-content: center;
border: 1px solid var(--border);
border-radius: var(--radius);
background: var(--surface);
cursor: pointer;
font-size: 18px;
line-height: 1;
color: var(--text);
flex-shrink: 0;
-webkit-appearance: none;
appearance: none;
}

.scroll-row {
display: flex;
gap: 6px;
margin-bottom: 12px;
overflow-x: auto;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
padding-bottom: 2px;
}
.scroll-row::-webkit-scrollbar { display: none; }

.mode-btn, .btn {
font-family: var(--mono);
font-size: 12px;
font-weight: 500;
letter-spacing: 0.03em;
padding: 0 16px;
min-height: 44px;
border: 1px solid var(--border);
border-radius: var(--radius);
background: var(--surface);
color: var(--text);
cursor: pointer;
white-space: nowrap;
flex-shrink: 0;
-webkit-appearance: none;
appearance: none;
transition: all 0.15s ease;
}

.mode-btn:active, .btn:active { transform: scale(0.97); }
.mode-btn.active, .btn.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
.btn.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

.workspace {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
min-height: calc(100dvh - 220px);
}

@media (max-width: 768px) {
.workspace { grid-template-columns: 1fr; min-height: auto; }
.panel { min-height: 35vh; }
}

.panel {
background: var(--surface);
border: 1px solid var(--border);
border-radius: var(--radius-lg);
display: flex;
flex-direction: column;
overflow: hidden;
}

.panel-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 10px 14px;
border-bottom: 1px solid var(--border);
flex-shrink: 0;
min-height: 44px;
}

.panel-label {
font-family: var(--mono);
font-size: 11px;
font-weight: 600;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(--text-tertiary);
}

.panel-badge { font-family: var(--mono); font-size: 10px; color: var(--success); }
.panel-body { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; position: relative; }

textarea {
width: 100%;
height: 100%;
min-height: 250px;
padding: 14px;
border: none;
outline: none;
resize: none;
font-family: var(--mono);
font-size: 16px;
line-height: 1.6;
color: var(--text);
background: transparent;
tab-size: 2;
-webkit-appearance: none;
appearance: none;
}

textarea::placeholder { color: var(--text-tertiary); }

.output-area {
padding: 14px;
font-family: var(--mono);
font-size: 13px;
line-height: 1.7;
white-space: pre-wrap;
word-break: break-word;
}

.json-key { color: var(--type-key); font-weight: 500; }
.json-string { color: var(--type-string); }
.json-number { color: var(--type-number); }
.json-boolean { color: var(--type-boolean); }
.json-null { color: var(--type-null); font-style: italic; }
.json-bracket { color: var(--text-tertiary); }

.tree-node { padding-left: 0; }
.tree-node .tree-node { padding-left: 18px; }

.tree-row {
display: flex;
align-items: baseline;
gap: 4px;
padding: 3px 0;
min-height: 32px;
border-radius: 4px;
}

.tree-row:active { background: var(--surface-alt); }

.tree-toggle {
width: 32px; min-width: 32px; height: 32px; min-height: 32px;
display: inline-flex; align-items: center; justify-content: center;
cursor: pointer; color: var(--text-tertiary); font-size: 10px;
flex-shrink: 0; user-select: none; transition: transform 0.15s ease;
}

.tree-toggle.collapsed { transform: rotate(-90deg); }
.tree-toggle.leaf { visibility: hidden; width: 12px; min-width: 12px; }

.tree-key {
color: var(--type-key); font-weight: 500; cursor: pointer;
padding: 2px 4px; border-radius: 3px;
}

.tree-key:active { background: var(--surface-alt); }
.tree-count { color: var(--text-tertiary); font-size: 11px; margin-left: 4px; }
.tree-children.hidden { display: none; }

.bar {
padding: 8px 14px;
border-bottom: 1px solid var(--border);
display: flex;
gap: 8px;
align-items: center;
flex-shrink: 0;
min-height: 44px;
}

.bar.bottom { border-bottom: none; border-top: 1px solid var(--border); }

.bar input[type="text"] {
flex: 1;
font-family: var(--mono);
font-size: 16px;
padding: 8px 10px;
min-height: 36px;
border: 1px solid var(--border);
border-radius: 6px;
outline: none;
background: var(--bg);
color: var(--text);
-webkit-appearance: none;
appearance: none;
}

.bar input[type="text"]:focus { border-color: var(--border-focus); }
.bar-label { font-family: var(--mono); font-size: 11px; color: var(--text-tertiary); white-space: nowrap; }
.bar-error { font-family: var(--mono); font-size: 11px; color: var(--error); white-space: nowrap; }

.path-bar {
padding: 10px 14px;
border-top: 1px solid var(--border);
font-family: var(--mono);
font-size: 12px;
color: var(--text-secondary);
background: var(--surface-alt);
display: flex;
align-items: center;
gap: 8px;
min-height: 44px;
flex-shrink: 0;
cursor: pointer;
}

.path-bar:active { background: var(--border); }
.path-bar .path-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.path-bar .copy-hint { color: var(--text-tertiary); font-size: 10px; }

.error-banner {
padding: 10px 14px;
background: var(--error-bg);
border-bottom: 1px solid var(--error-border);
font-family: var(--mono);
font-size: 12px;
color: var(--error);
display: flex;
align-items: flex-start;
gap: 8px;
flex-shrink: 0;
}

.error-banner .e-icon { flex-shrink: 0; margin-top: 2px; }
.error-banner .e-text { flex: 1; line-height: 1.5; }

.stats-bar {
padding: 8px 14px;
border-top: 1px solid var(--border);
font-family: var(--mono);
font-size: 10px;
color: var(--text-tertiary);
display: flex;
gap: 12px;
flex-wrap: wrap;
flex-shrink: 0;
min-height: 32px;
align-items: center;
}

.indent-group {
display: flex; gap: 2px; background: var(--surface-alt);
border-radius: 6px; padding: 2px;
}

.indent-tab {
font-family: var(--mono); font-size: 11px; font-weight: 500;
padding: 6px 10px; min-height: 32px;
border: none; border-radius: 4px; background: transparent;
color: var(--text-tertiary); cursor: pointer;
-webkit-appearance: none; appearance: none;
}

.indent-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }

.ts-output {
padding: 14px;
font-family: var(--mono);
font-size: 13px;
line-height: 1.7;
white-space: pre-wrap;
color: var(--text);
}

.ts-keyword { color: var(--type-boolean); font-weight: 500; }
.ts-type { color: var(--type-number); }
.ts-prop { color: var(--type-key); }

.diff-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
@media (max-width: 768px) { .diff-panels { grid-template-columns: 1fr; } }
.diff-panels > div { border-right: 1px solid var(--border); }
.diff-panels > div:last-child { border-right: none; }
@media (max-width: 768px) {
.diff-panels > div { border-right: none; border-bottom: 1px solid var(--border); }
.diff-panels > div:last-child { border-bottom: none; }
}
.diff-panels textarea { min-height: 180px; }

.diff-label {
font-family: var(--mono); font-size: 10px; font-weight: 600;
letter-spacing: 0.1em; text-transform: uppercase;
color: var(--text-tertiary); padding: 10px 14px;
border-bottom: 1px solid var(--border);
}

.diff-result { padding: 14px; font-family: var(--mono); font-size: 12px; line-height: 1.7; }

.diff-row {
padding: 6px 10px; margin: 3px 0; border-radius: 6px;
min-height: 36px; display: flex; align-items: baseline;
gap: 6px; flex-wrap: wrap;
}

.diff-add { background: var(--diff-add-bg); color: var(--diff-add-text); }
.diff-rm { background: var(--diff-rm-bg); color: var(--diff-rm-text); }
.diff-ch { background: var(--diff-ch-bg); color: var(--diff-ch-text); }
.diff-path { font-weight: 600; }

.toast {
position: fixed;
bottom: calc(24px + var(--safe-bottom));
left: 50%; transform: translateX(-50%) translateY(80px);
background: var(--accent); color: var(--accent-text);
font-family: var(--mono); font-size: 12px;
padding: 12px 24px; border-radius: var(--radius);
opacity: 0; transition: all 0.3s ease; z-index: 100;
pointer-events: none;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.empty {
display: flex; align-items: center; justify-content: center;
height: 100%; min-height: 200px; color: var(--text-tertiary);
font-family: var(--mono); font-size: 13px; text-align: center; padding: 20px;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

<body>

<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  const THEME_KEY = 'kin-json-theme';
  let theme = localStorage.getItem(THEME_KEY) || 'light';

  function applyTheme(t) {
    theme = t;
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('theme-color-meta').content = t === 'dark' ? '#131316' : '#f2f0EC';
    localStorage.setItem(THEME_KEY, t);
  }
  applyTheme(theme);

  let S = {
    input: '', parsed: null, error: null, fixed: false,
    mode: 'format', indent: 2, sortKeys: false,
    queryPath: '', searchTerm: '', selectedPath: '',
    diffA: '', diffB: '',
    _cursors: {}
  };

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1800);
  }

  function copyText(t) { navigator.clipboard.writeText(t).then(() => toast('Copied')).catch(() => toast('Copy failed')); }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function tryParse(str) {
    if (!str.trim()) return { parsed: null, error: null, fixed: false };
    try { return { parsed: JSON.parse(str), error: null, fixed: false }; }
    catch(e) {
      let f = str.replace(/,\s*([\]}])/g,'$1').replace(/'/g,'"').replace(/(\{|,)\s*([a-zA-Z_$][a-zA-Z0-9_$]*)\s*:/g,'$1"$2":');
      try { return { parsed: JSON.parse(f), error: null, fixed: true }; }
      catch(e2) {
        const m = e.message.match(/position\s+(\d+)/i);
        let pos = m ? parseInt(m[1]) : null, line = null, col = null;
        if (pos !== null) { const b = str.substring(0,pos); line = (b.match(/\n/g)||[]).length+1; col = pos-b.lastIndexOf('\n'); }
        return { parsed: null, error: { message: e.message, line, col }, fixed: false };
      }
    }
  }

  function getStats(obj) {
    let keys=0, depth=0, arrays=0, objects=0;
    function w(v,d) {
      if (d>depth) depth=d;
      if (v===null||typeof v!=='object') return;
      if (Array.isArray(v)) { arrays++; v.forEach(i=>w(i,d+1)); return; }
      objects++; const k=Object.keys(v); keys+=k.length; k.forEach(key=>w(v[key],d+1));
    }
    w(obj,0);
    return { keys, depth, arrays, objects, bytes: new Blob([JSON.stringify(obj)]).size };
  }

  function fmtB(b) { return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB'; }

  function sortKeysDeep(o) {
    if (o===null||typeof o!=='object') return o;
    if (Array.isArray(o)) return o.map(sortKeysDeep);
    const s={}; Object.keys(o).sort().forEach(k=>{s[k]=sortKeysDeep(o[k]);}); return s;
  }

  function queryJson(o,p) {
    if (!p.trim()) return o;
    const parts=p.replace(/\[(\d+)\]/g,'.$1').split('.').filter(Boolean);
    let c=o;
    for (const pt of parts) {
      if (c===null||c===undefined) return undefined;
      if (Array.isArray(c)) { const i=parseInt(pt); c=isNaN(i)?undefined:c[i]; }
      else if (typeof c==='object') c=c[pt]; else return undefined;
    }
    return c;
  }

  function highlight(json) {
    if (typeof json!=='string') json=JSON.stringify(json,null,S.indent);
    return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
        m=>{let c='json-number';if(/^"/.test(m))c=/:$/.test(m)?'json-key':'json-string';else if(/true|false/.test(m))c='json-boolean';else if(/null/.test(m))c='json-null';return'<span class="'+c+'">'+m+'</span>';})
      .replace(/([{}[\]])/g,'<span class="json-bracket">$1</span>');
  }

  function buildTree(obj,key,path) {
    const fp=path?(typeof key==='number'?path+'['+key+']':path+'.'+key):(key!==null?String(key):'');
    const id='t_'+Math.random().toString(36).substr(2,6);
    if (obj===null) return leaf(key,'<span class="json-null">null</span>',fp);
    if (typeof obj==='boolean') return leaf(key,'<span class="json-boolean">'+obj+'</span>',fp);
    if (typeof obj==='number') return leaf(key,'<span class="json-number">'+obj+'</span>',fp);
    if (typeof obj==='string') { const d=esc(obj.length>60?obj.substring(0,60)+'...':obj); return leaf(key,'<span class="json-string">"'+d+'"</span>',fp); }
    const isA=Array.isArray(obj),cnt=isA?obj.length:Object.keys(obj).length,br=isA?['[',']']:['{','}'];
    let h='<div class="tree-node"><div class="tree-row">';
    h+='<span class="tree-toggle" data-tid="'+id+'">&#9660;</span>';
    if (key!==null) h+='<span class="tree-key" data-path="'+esc(fp)+'">'+esc(String(key))+'</span>: ';
    h+='<span class="json-bracket">'+br[0]+'</span><span class="tree-count">'+cnt+(cnt===1?' item':' items')+'</span>';
    h+='</div><div class="tree-children" id="'+id+'">';
    if (isA) obj.forEach((v,i)=>{h+=buildTree(v,i,fp);});
    else Object.keys(obj).forEach(k=>{h+=buildTree(obj[k],k,fp);});
    h+='</div><div class="tree-row"><span class="tree-toggle leaf"></span><span class="json-bracket">'+br[1]+'</span></div></div>';
    return h;
  }

  function leaf(key,vH,path) {
    let h='<div class="tree-node"><div class="tree-row"><span class="tree-toggle leaf"></span>';
    if (key!==null) h+='<span class="tree-key" data-path="'+esc(path)+'">'+esc(String(key))+'</span>: ';
    return h+'<span>'+vH+'</span></div></div>';
  }

  function toTS(obj,html) {
    const ifaces=[],seen=new Set();
    function inf(v,n){if(v===null)return'null';if(Array.isArray(v)){if(!v.length)return'unknown[]';const ts=[...new Set(v.map(x=>inf(x,n)))];return(ts.length===1?ts[0]:'('+ts.join(' | ')+')')+'[]';}if(typeof v==='object'){const nm=cap(n||'Object');if(!seen.has(nm)){seen.add(nm);gen(v,nm);}return nm;}return typeof v;}
    function cap(s){return s.charAt(0).toUpperCase()+s.slice(1).replace(/[^a-zA-Z0-9]/g,'');}
    function gen(o,nm){const l=[];
      if(html){l.push('<span class="ts-keyword">interface</span> <span class="ts-type">'+esc(nm)+'</span> {');for(const[k,v]of Object.entries(o)){const t=inf(v,k);const sk=/^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(k)?k:'"'+k+'"';l.push('  <span class="ts-prop">'+esc(sk)+'</span>: <span class="ts-type">'+esc(t)+'</span>;');}
      }else{l.push('interface '+nm+' {');for(const[k,v]of Object.entries(o)){const t=inf(v,k);const sk=/^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(k)?k:'"'+k+'"';l.push('  '+sk+': '+t+';');}}
      l.push('}');ifaces.push(l.join('\n'));}
    if(Array.isArray(obj)){if(obj.length&&typeof obj[0]==='object'&&obj[0]!==null){gen(obj[0],'Root');const kw=html?'<span class="ts-keyword">type</span>':'type';const tp=html?'<span class="ts-type">RootList</span> = <span class="ts-type">Root[]</span>':'RootList = Root[]';ifaces.push(kw+' '+tp+';');}}
    else if(typeof obj==='object'&&obj!==null)gen(obj,'Root');
    return ifaces.join('\n\n');
  }

  function diffJson(a,b,p){p=p||'';const r=[];if(a===b)return r;if(a===null||b===null||typeof a!==typeof b||typeof a!=='object'){r.push({type:'changed',path:p||'(root)',from:a,to:b});return r;}const aA=Array.isArray(a),bA=Array.isArray(b);if(aA!==bA){r.push({type:'changed',path:p||'(root)',from:a,to:b});return r;}if(aA){for(let i=0;i<Math.max(a.length,b.length);i++){const pp=p+'['+i+']';if(i>=a.length)r.push({type:'added',path:pp,value:b[i]});else if(i>=b.length)r.push({type:'removed',path:pp,value:a[i]});else r.push(...diffJson(a[i],b[i],pp));}}else{const ks=new Set([...Object.keys(a),...Object.keys(b)]);for(const k of ks){const pp=p?p+'.'+k:k;if(!(k in a))r.push({type:'added',path:pp,value:b[k]});else if(!(k in b))r.push({type:'removed',path:pp,value:a[k]});else r.push(...diffJson(a[k],b[k],pp));}}return r;}

  function trunc(v){const s=JSON.stringify(v);return s.length>50?s.substring(0,50)+'...':s;}

  function saveCursor(id){const el=document.getElementById(id);if(el&&document.activeElement===el)S._cursors[id]={s:el.selectionStart,e:el.selectionEnd};}
  function restoreCursors(){for(const[id,c]of Object.entries(S._cursors)){const el=document.getElementById(id);if(el){el.focus();el.selectionStart=c.s;el.selectionEnd=c.e;}}S._cursors={};}

  function render() {
    const r=tryParse(S.input); S.parsed=r.parsed; S.error=r.error; S.fixed=r.fixed;
    let obj=S.parsed; if(obj!==null&&S.sortKeys)obj=sortKeysDeep(obj);
    let qd=obj,qErr=null;
    if(S.queryPath&&obj!==null){const q=queryJson(obj,S.queryPath);if(q===undefined)qErr='Not found';else qd=q;}
    const stats=obj!==null?getStats(obj):null;
    const ti=theme==='dark'?'&#9788;':'&#9789;';

    let h='<header><div class="logo">KIN <span>JSON</span></div>';
    h+='<button class="theme-toggle" id="theme-btn" aria-label="Toggle theme">'+ti+'</button></header>';

    h+='<div class="scroll-row">';
    ['format','tree','typescript','diff'].forEach(m=>{const l=m==='typescript'?'TS':m.charAt(0).toUpperCase()+m.slice(1);h+='<button class="mode-btn'+(S.mode===m?' active':'')+'" data-mode="'+m+'">'+l+'</button>';});
    h+='</div>';

    h+='<div class="scroll-row">';
    h+='<button class="btn" id="btn-paste">Paste</button>';
    h+='<button class="btn" id="btn-minify">Minify</button>';
    h+='<button class="btn'+(S.sortKeys?' active':'')+'" id="btn-sort">Sort keys</button>';
    h+='<button class="btn primary" id="btn-copy">Copy output</button>';
    h+='</div>';

    if(S.mode==='diff'){h+=renderDiff();}
    else {
      h+='<div class="workspace">';

      // Input
      h+='<div class="panel"><div class="panel-header"><span class="panel-label">Input</span>';
      if(S.input&&S.fixed)h+='<span class="panel-badge">Auto-fixed</span>';
      h+='</div>';
      if(S.error){h+='<div class="error-banner"><span class="e-icon">&#x2716;</span><span class="e-text">'+esc(S.error.message);if(S.error.line)h+=' (line '+S.error.line+', col '+S.error.col+')';h+='</span></div>';}
      h+='<div class="panel-body"><textarea id="input" placeholder="Paste JSON here...">'+esc(S.input)+'</textarea></div>';

  if(stats){h+='<div class="stats-bar"><span>'+fmtB(stats.bytes)+'</span><span>'+stats.keys+' keys</span><span>depth '+stats.depth+'</span><span>'+stats.objects+' obj</span><span>'+stats.arrays+' arr</span></div>';}
  h+='</div>';

  // Output
  h+='<div class="panel"><div class="panel-header"><span class="panel-label">Output</span>';
  if(S.mode==='format'){h+='<div class="indent-group">';[2,4,1].forEach(n=>{const l=n===1?'tab':n+'sp';h+='<button class="indent-tab'+(S.indent===n?' active':'')+'" data-indent="'+n+'">'+l+'</button>';});h+='</div>';}
  h+='</div>';

  if(S.mode==='format'||S.mode==='tree'){h+='<div class="bar"><span class="bar-label">$</span><input type="text" id="query-input" placeholder="data.users[0].name" value="'+esc(S.queryPath)+'">';if(qErr)h+='<span class="bar-error">'+esc(qErr)+'</span>';h+='</div>';}
  if(S.mode==='tree'){h+='<div class="bar"><input type="text" id="search-input" placeholder="Search keys or values..." value="'+esc(S.searchTerm)+'"></div>';}

  h+='<div class="panel-body">';
  if(qd!==null&&S.mode==='format'){const ic=S.indent===1?'\t':S.indent;h+='<div class="output-area">'+highlight(JSON.stringify(qd,null,ic))+'</div>';}
  else if(qd!==null&&S.mode==='tree'){h+='<div class="output-area">'+buildTree(qd,null,'')+'</div>';}
  else if(qd!==null&&S.mode==='typescript'){h+='<div class="ts-output">'+toTS(qd,true)+'</div>';}
  else if(S.error){h+='<div class="empty">Fix errors to see output</div>';}
  else{h+='<div class="empty">Paste JSON in the input panel</div>';}
  h+='</div>';

  if(S.selectedPath){h+='<div class="path-bar" id="path-bar"><span class="path-text">'+esc(S.selectedPath)+'</span><span class="copy-hint">tap to copy</span></div>';}

  h+='</div></div>';
}

document.getElementById('app').innerHTML=h;
bind();
restoreCursors();

}

function renderDiff(){
let h='<div class="workspace" style="grid-template-columns:1fr"><div class="panel"><div class="panel-header"><span class="panel-label">Diff</span></div>';
h+='<div class="diff-panels"><div><div class="diff-label">A (before)</div><textarea id="diff-a" placeholder="Paste first JSON...">'+esc(S.diffA)+'</textarea></div>';
h+='<div><div class="diff-label">B (after)</div><textarea id="diff-b" placeholder="Paste second JSON...">'+esc(S.diffB)+'</textarea></div></div>';
const pA=tryParse(S.diffA),pB=tryParse(S.diffB);
if(pA.parsed!==null&&pB.parsed!==null){
const d=diffJson(pA.parsed,pB.parsed);
h+='<div style="border-top:1px solid var(--border)">';
if(!d.length){h+='<div class="diff-result" style="color:var(--success)">No differences</div>';}
else{h+='<div class="diff-result"><div style="margin-bottom:8px;color:var(--text-tertiary);font-size:11px">'+d.length+' change'+(d.length!==1?'s':'')+'</div>';
d.forEach(x=>{if(x.type==='added')h+='<div class="diff-row diff-add"><span class="diff-path">'+esc(x.path)+'</span> + '+esc(trunc(x.value))+'</div>';else if(x.type==='removed')h+='<div class="diff-row diff-rm"><span class="diff-path">'+esc(x.path)+'</span> - '+esc(trunc(x.value))+'</div>';else h+='<div class="diff-row diff-ch"><span class="diff-path">'+esc(x.path)+'</span> '+esc(trunc(x.from))+' → '+esc(trunc(x.to))+'</div>';});
h+='</div>';}
h+='</div>';
} else if(S.diffA||S.diffB){
h+='<div style="border-top:1px solid var(--border)"><div class="diff-result" style="color:var(--text-tertiary)">';
if(pA.error)h+='A: '+esc(pA.error.message)+'<br>';if(pB.error)h+='B: '+esc(pB.error.message);
if(!S.diffA||!S.diffB)h+='Paste JSON in both panels';
h+='</div></div>';
}
h+='</div></div>';return h;
}

function bind(){
document.getElementById('theme-btn')?.addEventListener('click',()=>{applyTheme(theme==='dark'?'light':'dark');render();});
document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',()=>{S.mode=b.dataset.mode;render();}));

const inp=document.getElementById('input');
if(inp){
  inp.addEventListener('input',e=>{saveCursor('input');S.input=e.target.value;render();});
  inp.addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();const s=inp.selectionStart,end=inp.selectionEnd;inp.value=inp.value.substring(0,s)+'  '+inp.value.substring(end);inp.selectionStart=inp.selectionEnd=s+2;S.input=inp.value;}});
}

const da=document.getElementById('diff-a'),db=document.getElementById('diff-b');
if(da)da.addEventListener('input',e=>{saveCursor('diff-a');S.diffA=e.target.value;render();});
if(db)db.addEventListener('input',e=>{saveCursor('diff-b');S.diffB=e.target.value;render();});

document.querySelectorAll('[data-indent]').forEach(b=>b.addEventListener('click',()=>{S.indent=parseInt(b.dataset.indent);render();}));

document.getElementById('btn-paste')?.addEventListener('click',()=>{navigator.clipboard.readText().then(t=>{S.input=t;render();}).catch(()=>toast('Clipboard denied'));});
document.getElementById('btn-minify')?.addEventListener('click',()=>{if(S.parsed){S.input=JSON.stringify(S.parsed);render();}});
document.getElementById('btn-sort')?.addEventListener('click',()=>{S.sortKeys=!S.sortKeys;render();});
document.getElementById('btn-copy')?.addEventListener('click',()=>{
  if(S.mode==='typescript'&&S.parsed){copyText(toTS(S.parsed,false));return;}
  if(S.parsed){let o=S.sortKeys?sortKeysDeep(S.parsed):S.parsed;if(S.queryPath){const q=queryJson(o,S.queryPath);if(q!==undefined)o=q;}copyText(JSON.stringify(o,null,S.indent===1?'\t':S.indent));}
});

const qi=document.getElementById('query-input');
if(qi)qi.addEventListener('input',e=>{saveCursor('query-input');S.queryPath=e.target.value;render();});

const si=document.getElementById('search-input');
if(si)si.addEventListener('input',e=>{S.searchTerm=e.target.value;});

document.querySelectorAll('.tree-toggle:not(.leaf)').forEach(t=>t.addEventListener('click',()=>{const tgt=document.getElementById(t.dataset.tid);if(tgt){tgt.classList.toggle('hidden');t.classList.toggle('collapsed');}}));
document.querySelectorAll('.tree-key[data-path]').forEach(k=>k.addEventListener('click',()=>{S.selectedPath=k.dataset.path;render();}));
document.getElementById('path-bar')?.addEventListener('click',()=>copyText(S.selectedPath));

}

render();
})();
</script>

    .kin-br-select-wrap select {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 10px 36px 10px 12px; color: #fff; font-size: 13px;
      appearance: none; cursor: pointer; outline: none; font-family: inherit;
    }
    .kin-br-select-wrap::after {
      content: ''; position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      border: 5px solid transparent; border-top-color: rgba(255,255,255,0.4); margin-top: 3px;
    }
    .kin-br-ta {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 10px 12px; color: #fff; font-size: 13px; font-family: inherit;
      resize: none; outline: none; box-sizing: border-box;
    }
    .kin-br-ta::placeholder { color: rgba(255,255,255,0.25); }
    .kin-br-anon { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .kin-br-anon-text div:first-child { color: #fff; font-size: 13px; }
    .kin-br-anon-text div:last-child  { color: rgba(255,255,255,0.35); font-size: 11px; margin-top: 2px; }
    .kin-br-toggle {
      width: 44px !important; height: 26px !important; border-radius: 99px;
      background: #5b5ef4; border: none; cursor: pointer;
      position: relative; transition: background 0.2s; flex: none !important; min-height: 0 !important;
    }
    .kin-br-toggle::after {
      content: ''; position: absolute; top: 3px; left: calc(100% - 23px);
      width: 20px; height: 20px; border-radius: 50%; background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3); transition: left 0.2s;
    }
    .kin-br-toggle.off { background: rgba(255,255,255,0.1); }
    .kin-br-toggle.off::after { left: 3px; }
    .kin-br-extras { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
    .kin-br-input {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 10px 12px; color: #fff; font-size: 13px;
      font-family: inherit; outline: none; width: 100%; box-sizing: border-box;
    }
    .kin-br-input::placeholder { color: rgba(255,255,255,0.25); }
    .kin-br-submit {
      width: 100%; padding: 13px; border-radius: 12px;
      background: #5b5ef4; border: none; color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
      letter-spacing: 0.02em;
    }
    .kin-br-success { text-align: center; padding: 28px 0 8px; }
    .kin-br-success svg { display: block; margin: 0 auto 16px; }
    .kin-br-success h3 { color: #fff; font-size: 17px; font-weight: 600; margin: 0 0 8px; }
    .kin-br-success p  { color: rgba(255,255,255,0.4); font-size: 13px; line-height: 1.5; margin: 0 0 28px; }
    .kin-br-done {
      padding: 11px 32px; border-radius: 10px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7); font-size: 13px; cursor: pointer; font-family: inherit;
    }
  </style>

  <!-- Backdrop -->
  <div id="kin-bug-backdrop"></div>

  <!-- Bug report sheet -->
  <div id="kin-bug-sheet">
    <div id="kin-br-form-view">
      <div class="kin-br-handle"><div></div></div>
      <div class="kin-br-head">
        <div>
          <h2>Report an issue</h2>
          <p>KIN-023 — JSON Formatter</p>
        </div>
        <button class="kin-br-close" id="kin-bug-close" aria-label="Close">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="kin-br-form">
        <div class="kin-br-field">
          <label class="kin-br-label">Type</label>
          <div class="kin-br-select-wrap">
            <select name="type">
              <option value="bug">🐛 Bug — something isn't working</option>
              <option value="suggestion">💡 Suggestion — an idea or request</option>
              <option value="other">💬 Other</option>
            </select>
          </div>
        </div>
        <div class="kin-br-field">
          <label class="kin-br-label">What happened?</label>
          <textarea class="kin-br-ta" name="description" rows="3" placeholder="Describe the issue or idea…" required></textarea>
        </div>
        <div class="kin-br-anon">
          <div class="kin-br-anon-text">
            <div>Send anonymously</div>
            <div>No name or email needed</div>
          </div>
          <button type="button" class="kin-br-toggle" id="kin-br-anon-toggle" aria-pressed="true"></button>
        </div>
        <div class="kin-br-extras" id="kin-br-extras" style="display:none">
          <input class="kin-br-input" type="text" name="name" placeholder="Your name (optional)">
        </div>
        <button type="submit" class="kin-br-submit">Send report</button>
      </form>
    </div>
    <div id="kin-br-success-view" style="display:none">
      <div class="kin-br-handle"><div></div></div>
      <div class="kin-br-success">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" stroke="#2ea043" stroke-width="1.5"/><path d="M7 12.5l3.5 3.5L17 9" stroke="#2ea043" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <h3>Thanks for the report</h3>
        <p>We'll take a look. Your feedback<br>helps make Kin better for everyone.</p>
        <button class="kin-br-done" id="kin-br-done">Done</button>
      </div>
    </div>
  </div>

  <script>
  (function() {
    var btn      = document.getElementById('kin-bug-btn');
    var backdrop = document.getElementById('kin-bug-backdrop');
    var sheet    = document.getElementById('kin-bug-sheet');
    var closeBtn = document.getElementById('kin-bug-close');
    var doneBtn  = document.getElementById('kin-br-done');
    var form     = document.getElementById('kin-br-form');
    var formView = document.getElementById('kin-br-form-view');
    var successView = document.getElementById('kin-br-success-view');
    var anonToggle = document.getElementById('kin-br-anon-toggle');
    var extras   = document.getElementById('kin-br-extras');
    var anon     = true;

    function openSheet() {
      backdrop.classList.add('open');
      sheet.style.display = 'block';
      requestAnimationFrame(function() { sheet.classList.add('open'); });
    }
    function closeSheet() {
      sheet.classList.remove('open');
      setTimeout(function() {
        sheet.style.display = 'none';
        backdrop.classList.remove('open');
        form.reset();
        formView.style.display = 'block';
        successView.style.display = 'none';
        anon = true;
        anonToggle.classList.remove('off');
        extras.style.display = 'none';
      }, 300);
    }

    btn.addEventListener('click', openSheet);
    backdrop.addEventListener('click', closeSheet);
    closeBtn.addEventListener('click', closeSheet);
    doneBtn.addEventListener('click', closeSheet);

    anonToggle.addEventListener('click', function() {
      anon = !anon;
      anonToggle.classList.toggle('off', !anon);
      extras.style.display = anon ? 'none' : 'flex';
    });

    var SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxBRGfOmtQUxyaBGjYVj2mtKinI7qlGm1v921K49TiBDP5RUY9CWK_M-vpLCm2HWJxhuA/exec';

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var data = new FormData(form);
      var typeRaw = data.get('type') || '';
      var formType = 'bug';
      if (typeRaw.toLowerCase().indexOf('feature') !== -1) formType = 'idea';
      else if (typeRaw.toLowerCase().indexOf('other') !== -1) formType = 'app_suggestion';
      fetch(SHEETS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          form_type: 'bug_report',
          subject: 'KIN-023 — JSON Formatter',
          app: 'KIN-023',
          type: typeRaw,
          description: data.get('description') || '',
          name: anon ? '' : (data.get('name') || '')
        })
      }).catch(function() {});
      formView.style.display = 'none';
      successView.style.display = 'block';
    });
  })();
  </script>
</body>
</html>

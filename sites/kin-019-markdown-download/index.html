<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Download — Kin</title>
  <meta name="description" content="Write or paste text and download it as a .md file. Free, offline, no accounts. KIN-019 by Darren for Kin.">
  <meta name="theme-color" content="#111110" id="theme-color-meta">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Markdown Download">
  <link rel="manifest" id="manifest-link">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #111110;
      --surface:     #1c1c1a;
      --surface2:    #252522;
      --border:      #2e2e2b;
      --border-hover:#3d3d39;
      --text:        #f0efe8;
      --text-mid:    #9c9a90;
      --text-dim:    #5c5b54;
      --accent:      #7eb88a;
      --accent-dim:  #2a4030;
      --radius:      12px;
      --radius-sm:   8px;
    }

    html.light {
      --bg:          #FAFAF7;
      --surface:     #FFFFFF;
      --surface2:    #F3F2EE;
      --border:      #E4E2DC;
      --border-hover:#CCCAC2;
      --text:        #1A1A18;
      --text-mid:    #5C5B56;
      --text-dim:    #9C9A94;
      --accent:      #2D5A3D;
      --accent-dim:  #E8F0EB;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 52px 20px 80px;
      animation: fadeUp 0.4s ease-out both;
    }

    #theme-btn {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 999;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: border-color 0.2s, background 0.2s;
    }
    #theme-btn:hover { border-color: var(--border-hover); }

    .kin-header { margin-bottom: 36px; }

    .kin-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .kin-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(26px, 6vw, 36px);
      font-weight: 400;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .kin-sub {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.6;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .filename-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
    }

    .filename-row input {
      flex: 1;
    }

    .filename-ext {
      font-size: 14px;
      color: var(--text-dim);
      font-weight: 500;
      white-space: nowrap;
    }

    input, select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 10px 12px;
      width: 100%;
      transition: border-color 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }

    input::placeholder, textarea::placeholder { color: var(--text-dim); }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    textarea {
      min-height: 320px;
      resize: vertical;
      line-height: 1.7;
      font-size: 14px;
      font-family: 'DM Sans', monospace;
      tab-size: 2;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.82; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-mid);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 18px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); }

    .meta {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .kin-footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .foot-brand {
      font-family: 'Instrument Serif', serif;
      font-size: 16px;
      color: var(--text-dim);
    }

    .foot-meta {
      font-size: 11px;
      color: var(--text-dim);
      text-align: right;
      line-height: 1.7;
    }
  </style>
</head>
<body>

<button id="theme-btn" aria-label="Toggle theme">☀️</button>

<div class="wrap">

  <div class="kin-header">
    <div class="kin-label">KIN-019 · Darren</div>
    <h1 class="kin-title">Markdown Download</h1>
    <p class="kin-sub">Write or paste text and download it as a .md file.</p>
  </div>

  <div class="section-label">Filename</div>
  <div class="filename-row">
    <input type="text" id="filename" placeholder="untitled" autocomplete="off" spellcheck="false">
    <span class="filename-ext">.md</span>
  </div>

  <div class="section-label">Content</div>
  <textarea id="content" placeholder="Write or paste your markdown here..."></textarea>

  <div class="meta">
    <span id="word-count">0 words</span>
    <span id="char-count">0 characters</span>
  </div>

  <div class="actions">
    <button class="btn-primary" id="download-btn" disabled>Download .md</button>
    <button class="btn-ghost" id="copy-btn">Copy text</button>
    <button class="btn-ghost" id="clear-btn">Clear</button>
  </div>

  <footer class="kin-footer">
    <div class="foot-brand">Kin</div>
    <div class="foot-meta">Markdown Download · KIN-019 · by Darren<br>No tracking · Works offline</div>
  </footer>

</div>

<div class="toast" id="toast"></div>

<script>
  const themeBtn = document.getElementById('theme-btn');
  let isDark = false;
  const THEME_DARK = '#111110';
  const THEME_LIGHT = '#FAFAF7';

  document.documentElement.classList.add('light');
  themeBtn.textContent = '🌙';
  document.getElementById('theme-color-meta').setAttribute('content', THEME_LIGHT);

  function updateThemeMeta(dark) {
    document.getElementById('theme-color-meta').setAttribute('content', dark ? THEME_DARK : THEME_LIGHT);
  }

  themeBtn.addEventListener('click', () => {
    isDark = !isDark;
    document.documentElement.classList.toggle('light', !isDark);
    themeBtn.textContent = isDark ? '☀️' : '🌙';
    updateThemeMeta(isDark);
  });

  const content  = document.getElementById('content');
  const filename = document.getElementById('filename');
  const downloadBtn = document.getElementById('download-btn');
  const copyBtn  = document.getElementById('copy-btn');
  const clearBtn = document.getElementById('clear-btn');
  const wordCount = document.getElementById('word-count');
  const charCount = document.getElementById('char-count');
  const toast    = document.getElementById('toast');

  let toastTimer;
  function showToast(msg) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function updateCounts() {
    const text  = content.value;
    const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
    const chars = text.length;
    wordCount.textContent = words + ' word' + (words !== 1 ? 's' : '');
    charCount.textContent = chars + ' character' + (chars !== 1 ? 's' : '');
    downloadBtn.disabled  = text.trim() === '';
  }

  content.addEventListener('input', updateCounts);

  content.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = content.selectionStart;
      const end   = content.selectionEnd;
      content.value = content.value.substring(0, start) + '  ' + content.value.substring(end);
      content.selectionStart = content.selectionEnd = start + 2;
      updateCounts();
    }
  });

  downloadBtn.addEventListener('click', () => {
    const text = content.value;
    if (!text.trim()) return;
    const name = (filename.value.trim() || 'untitled') + '.md';
    const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Downloaded ' + name);
  });

  copyBtn.addEventListener('click', () => {
    if (!content.value.trim()) { showToast('Nothing to copy'); return; }
    navigator.clipboard.writeText(content.value).then(() => {
      showToast('Copied to clipboard');
    }).catch(() => {
      content.select();
      document.execCommand('copy');
      showToast('Copied to clipboard');
    });
  });

  clearBtn.addEventListener('click', () => {
    if (!content.value.trim()) return;
    content.value  = '';
    filename.value = '';
    updateCounts();
    content.focus();
    showToast('Cleared');
  });

  // PWA
  const TOOL_NAME  = 'Markdown Download';
  const CACHE_NAME = 'kin-md-download-v1';

  const manifest = {
    name: TOOL_NAME + ' — Kin',
    short_name: TOOL_NAME,
    description: 'Write or paste text and download as .md. Free, offline, no accounts.',
    start_url: './',
    display: 'standalone',
    background_color: THEME_DARK,
    theme_color: THEME_DARK,
    icons: [
      { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%23111110'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='serif' font-size='120' fill='%23f0efe8'%3EK%3C/text%3E%3C/svg%3E", sizes: '192x192', type: 'image/svg+xml' },
      { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%23111110'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='serif' font-size='320' fill='%23f0efe8'%3EK%3C/text%3E%3C/svg%3E", sizes: '512x512', type: 'image/svg+xml' }
    ]
  };
  document.getElementById('manifest-link').setAttribute('href',
    'data:application/json,' + encodeURIComponent(JSON.stringify(manifest)));

  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = '${CACHE_NAME}';
      self.addEventListener('install', e => {
        self.skipWaiting();
        e.waitUntil(caches.open(CACHE).then(c => c.addAll([self.location.href])));
      });
      self.addEventListener('activate', e => {
        e.waitUntil(caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        ));
      });
      self.addEventListener('fetch', e => {
        e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return res;
        })));
      });`;
    const swBlob = new Blob([swCode], { type: 'text/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(swBlob));
  }
</script>

</body>
</html>

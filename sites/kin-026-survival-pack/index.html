<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f7f7f5" id="meta-theme">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>KIN — Kin Ground</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
--bg: #f7f7f5;
--bg-card: #ffffff;
--text: #1a1a1a;
--text-mid: #555555;
--text-light: #888888;
--border: #e0e0de;
--accent: #2a6b4a;
--accent-light: #e8f3ed;
--danger: #b44a3f;
--danger-light: #fbeae8;
--warn: #b8860b;
--warn-light: #fdf6e3;
--input-bg: #ffffff;
--tab-bg: #eaeae8;
--tab-active: #1a1a1a;
--tab-text: #888888;
--tab-active-text: #ffffff;
--shadow: 0 1px 3px rgba(0,0,0,0.06);
}

body.dark {
--bg: #121212 !important;
--bg-card: #1e1e1e !important;
--text: #e8e8e8 !important;
--text-mid: #aaaaaa !important;
--text-light: #777777 !important;
--border: #333333 !important;
--accent: #4a9e6e !important;
--accent-light: #1a2e22 !important;
--danger: #e06050 !important;
--danger-light: #2a1a18 !important;
--warn: #d4a820 !important;
--warn-light: #2a2510 !important;
--input-bg: #2a2a2a !important;
--tab-bg: #2a2a2a !important;
--tab-active: #e8e8e8 !important;
--tab-text: #777777 !important;
--tab-active-text: #121212 !important;
--shadow: 0 1px 3px rgba(0,0,0,0.3) !important;
}

body {
font-family: -apple-system, BlinkMacSystemFont, “Segoe UI”, Helvetica, Arial, sans-serif;
background: var(--bg);
color: var(--text);
font-size: 16px;
line-height: 1.5;
min-height: 100dvh;
padding-top: env(safe-area-inset-top);
padding-bottom: env(safe-area-inset-bottom);
padding-left: env(safe-area-inset-left);
padding-right: env(safe-area-inset-right);
-webkit-font-smoothing: antialiased;
transition: background 0.15s, color 0.15s;
}

.header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px 12px; border-bottom: 1px solid var(--border); background: var(--bg); }
.header h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
.demo-bar { display: none; background: var(--accent-light); padding: 10px 16px; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
.demo-bar.visible { display: flex; }
.demo-bar span { font-size: 13px; font-weight: 600; color: var(--accent); }
.demo-bar button { font-size: 13px; font-weight: 700; color: #fff; background: var(--accent); border: none; border-radius: 8px; padding: 6px 14px; cursor: pointer; min-height: 32px; -webkit-appearance: none; }
nav { display: flex; gap: 6px; padding: 10px 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; background: var(--bg); }
nav::-webkit-scrollbar { display: none; }
nav button { flex-shrink: 0; min-height: 44px; padding: 10px 14px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; background: var(--tab-bg); color: var(--tab-text); -webkit-appearance: none; transition: background 0.15s, color 0.15s; }
nav button.active { background: var(--tab-active); color: var(--tab-active-text); }
main { padding: 16px; max-width: 500px; margin: 0 auto; }
.icon-btn { width: 44px; height: 44px; border: none; background: none; font-size: 18px; cursor: pointer; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-light); -webkit-appearance: none; }
.card { background: var(--bg-card); border-radius: 12px; padding: 20px; margin-bottom: 14px; box-shadow: var(--shadow); border: 1px solid var(--border); }
.card-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-light); margin-bottom: 14px; }
label { display: block; font-size: 13px; font-weight: 600; color: var(--text-mid); margin-bottom: 6px; }
input, select { width: 100%; min-height: 44px; padding: 10px 12px; font-size: 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--input-bg); color: var(--text); -webkit-appearance: none; appearance: none; margin-bottom: 12px; outline: none; }
input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
.btn-primary { width: 100%; min-height: 48px; padding: 12px; font-size: 16px; font-weight: 600; border: none; border-radius: 10px; background: var(--accent); color: #fff; cursor: pointer; -webkit-appearance: none; }
.btn-primary:active { opacity: 0.85; }
.btn-secondary { width: 100%; min-height: 44px; padding: 10px; font-size: 14px; font-weight: 600; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-card); color: var(--text); cursor: pointer; -webkit-appearance: none; }
.btn-danger { background: var(--danger) !important; color: #fff !important; border: none !important; }
.result-box { background: var(--accent-light); border-radius: 10px; padding: 16px; margin-top: 14px; }
.warn-box { background: var(--warn-light); border-radius: 10px; padding: 16px; margin-top: 14px; }
.danger-box { background: var(--danger-light); border-radius: 10px; padding: 16px; margin-top: 14px; }
.result-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 14px; }
.result-label { color: var(--text-mid); }
.result-value { font-weight: 700; font-size: 16px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat-box { background: var(--bg); border-radius: 10px; padding: 14px; text-align: center; }
.stat-val { font-size: 22px; font-weight: 700; }
.stat-lbl { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.3px; margin-top: 2px; }
.list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); min-height: 44px; }
.list-item:last-child { border-bottom: none; }
.li-name { font-weight: 600; font-size: 15px; }
.li-detail { font-size: 13px; color: var(--text-light); }
.li-actions { display: flex; gap: 4px; align-items: center; }
.tag { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-left: 6px; }
.tag-green { background: var(--accent-light); color: var(--accent); }
.tag-red { background: var(--danger-light); color: var(--danger); }
.tag-amber { background: var(--warn-light); color: var(--warn); }
.toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; min-height: 44px; }
.toggle-label { font-weight: 600; font-size: 15px; }
.toggle-sw { width: 50px; height: 30px; border-radius: 15px; background: var(--border); position: relative; cursor: pointer; -webkit-appearance: none; border: none; transition: background 0.2s; }
.toggle-sw.on { background: var(--accent); }
.toggle-sw::after { content: ‘’; position: absolute; width: 24px; height: 24px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: transform 0.2s; }
.toggle-sw.on::after { transform: translateX(20px); }
.inline-form { display: flex; gap: 8px; margin-bottom: 12px; }
.inline-form input { flex: 1; margin-bottom: 0; }
.inline-form button { flex-shrink: 0; width: auto; padding: 10px 16px; }
.countdown { font-family: “SF Mono”, “Fira Code”, “Courier New”, monospace; font-size: 20px; font-weight: 700; }
.empty { text-align: center; padding: 32px 16px; color: var(--text-light); font-size: 14px; }
.section-break { height: 1px; background: var(--border); margin: 16px 0; }
.hidden { display: none !important; }
.pulse-section { padding: 14px 0; border-bottom: 1px solid var(--border); }
.pulse-section:last-child { border-bottom: none; }
.pulse-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-light); margin-bottom: 8px; }
.pulse-val { font-size: 15px; font-weight: 600; }
.pulse-empty { font-size: 13px; color: var(--text-light); cursor: pointer; }
.toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--tab-active); color: var(--tab-active-text); padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 999; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
.toast.show { opacity: 1; }
.footer { text-align: center; padding: 20px; font-size: 12px; color: var(--text-light); }
@media (max-width: 380px) { nav button { padding: 10px 10px; font-size: 12px; } main { padding: 12px; } .card { padding: 16px; } }
</style>

</head>
<body>

<footer style="text-align:center;padding:16px 16px 48px;font-family:-apple-system,sans-serif;font-size:11px;letter-spacing:0.04em;color:#9a8b7e">
  KIN-026 · <a href="https://kintools.netlify.app/" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">Kin Tools</a> · by Darren

  <div style="display:flex;justify-content:center;margin-top:8px"><span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:rgba(46,160,67,0.1);border:1px solid rgba(46,160,67,0.25);font-size:10px;font-weight:600;letter-spacing:0.08em;color:#2ea043;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"><svg width="9" height="11" viewBox="0 0 9 11" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.5 0.5L0.5 2.25V5.25C0.5 7.75 2.25 10.05 4.5 10.5C6.75 10.05 8.5 7.75 8.5 5.25V2.25L4.5 0.5Z" fill="#2ea043" fill-opacity="0.15" stroke="#2ea043" stroke-width="0.75"/><path d="M2.5 5.5L3.75 6.75L6.5 4" stroke="#2ea043" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>Local Only · Verified</span></div>

  <div style="margin-top:10px"><button id="kin-bug-btn" style="background:none;border:none;padding:0;color:inherit;font:inherit;opacity:0.4;font-size:11px;cursor:pointer;letter-spacing:0.04em;text-decoration:underline;text-underline-offset:3px;">Report a bug</button></div>
</footer>
  </div>

  <style>
    #kin-bug-backdrop {
      display: none; position: fixed; inset: 0; z-index: 901;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(2px);
    }
    #kin-bug-sheet {
      display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 902;
      background: #17171f;
      border-radius: 20px 20px 0 0;
      border: 1px solid rgba(255,255,255,0.08); border-bottom: none;
      padding: 0 20px 40px;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    #kin-bug-sheet.open { transform: translateY(0); }
    #kin-bug-backdrop.open { display: block; }
    .kin-br-handle { display: flex; justify-content: center; padding: 12px 0 4px; }
    .kin-br-handle div { width: 36px; height: 4px; border-radius: 99px; background: rgba(255,255,255,0.15); }
    .kin-br-head { display: flex; align-items: center; justify-content: space-between; margin: 8px 0 20px; }
    .kin-br-head h2 { color: #fff; font-size: 16px; font-weight: 600; margin: 0; }
    .kin-br-head p  { color: rgba(255,255,255,0.35); font-size: 11px; margin: 3px 0 0; letter-spacing: 0.04em; }
    .kin-br-close {
      width: 30px !important; height: 30px !important; border-radius: 50%;
      background: rgba(255,255,255,0.07); border: none;
      color: rgba(255,255,255,0.5); cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex: none !important; min-height: 0 !important;
    }
    .kin-br-label { display: block; color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 7px; }
    .kin-br-field { margin-bottom: 14px; }
    .kin-br-select-wrap { position: relative; }
    .kin-br-select-wrap select {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 10px 36px 10px 12px; color: #fff; font-size: 13px;
      appearance: none; cursor: pointer; outline: none; font-family: inherit;
    }
    .kin-br-select-wrap::after {
      content: ''; position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      border: 5px solid transparent; border-top-color: rgba(255,255,255,0.4); margin-top: 3px;
    }
    .kin-br-ta {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 10px 12px; color: #fff; font-size: 13px; font-family: inherit;
      resize: none; outline: none; box-sizing: border-box;
    }
    .kin-br-ta::placeholder { color: rgba(255,255,255,0.25); }
    .kin-br-anon { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .kin-br-anon-text div:first-child { color: #fff; font-size: 13px; }
    .kin-br-anon-text div:last-child  { color: rgba(255,255,255,0.35); font-size: 11px; margin-top: 2px; }
    .kin-br-toggle {
      width: 44px !important; height: 26px !important; border-radius: 99px;
      background: #5b5ef4; border: none; cursor: pointer;
      position: relative; transition: background 0.2s; flex: none !important; min-height: 0 !important;
    }
    .kin-br-toggle::after {
      content: ''; position: absolute; top: 3px; left: calc(100% - 23px);
      width: 20px; height: 20px; border-radius: 50%; background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3); transition: left 0.2s;
    }
    .kin-br-toggle.off { background: rgba(255,255,255,0.1); }
    .kin-br-toggle.off::after { left: 3px; }
    .kin-br-extras { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
    .kin-br-input {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 10px 12px; color: #fff; font-size: 13px;
      font-family: inherit; outline: none; width: 100%; box-sizing: border-box;
    }
    .kin-br-input::placeholder { color: rgba(255,255,255,0.25); }
    .kin-br-submit {
      width: 100%; padding: 13px; border-radius: 12px;
      background: #5b5ef4; border: none; color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
      letter-spacing: 0.02em;
    }
    .kin-br-success { text-align: center; padding: 28px 0 8px; }
    .kin-br-success svg { display: block; margin: 0 auto 16px; }
    .kin-br-success h3 { color: #fff; font-size: 17px; font-weight: 600; margin: 0 0 8px; }
    .kin-br-success p  { color: rgba(255,255,255,0.4); font-size: 13px; line-height: 1.5; margin: 0 0 28px; }
    .kin-br-done {
      padding: 11px 32px; border-radius: 10px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7); font-size: 13px; cursor: pointer; font-family: inherit;
    }
  </style>

  <div id="kin-bug-backdrop"></div>
  <div id="kin-bug-sheet">
    <div id="kin-br-form-view">
      <div class="kin-br-handle"><div></div></div>
      <div class="kin-br-head">
        <div>
          <h2>Report an issue</h2>
          <p>KIN-026 — Kin Ground</p>
        </div>
        <button class="kin-br-close" id="kin-bug-close" aria-label="Close">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="kin-br-form">
        <div class="kin-br-field">
          <label class="kin-br-label">Type</label>
          <div class="kin-br-select-wrap">
            <select name="type">
              <option value="bug">🐛 Bug — something isn't working</option>
              <option value="suggestion">💡 Suggestion — an idea or request</option>
              <option value="other">💬 Other</option>
            </select>
          </div>
        </div>
        <div class="kin-br-field">
          <label class="kin-br-label">What happened?</label>
          <textarea class="kin-br-ta" name="description" rows="3" placeholder="Describe the issue or idea…" required></textarea>
        </div>
        <div class="kin-br-anon">
          <div class="kin-br-anon-text">
            <div>Send anonymously</div>
            <div>No name or email needed</div>
          </div>
          <button type="button" class="kin-br-toggle" id="kin-br-anon-toggle" aria-pressed="true"></button>
        </div>
        <div class="kin-br-extras" id="kin-br-extras" style="display:none">
          <input class="kin-br-input" type="text" name="name" placeholder="Your name (optional)">
          <input class="kin-br-input" type="email" name="email" placeholder="Email for follow-up (optional)">
        </div>
        <button type="submit" class="kin-br-submit">Send report</button>
      </form>
    </div>
    <div id="kin-br-success-view" style="display:none">
      <div class="kin-br-handle"><div></div></div>
      <div class="kin-br-success">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" stroke="#2ea043" stroke-width="1.5"/><path d="M7 12.5l3.5 3.5L17 9" stroke="#2ea043" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <h3>Thanks for the report</h3>
        <p>We'll take a look. Your feedback<br>helps make Kin better for everyone.</p>
        <button class="kin-br-done" id="kin-br-done">Done</button>
      </div>
    </div>
  </div>

  <script>
  (function() {
    var btn      = document.getElementById('kin-bug-btn');
    var backdrop = document.getElementById('kin-bug-backdrop');
    var sheet    = document.getElementById('kin-bug-sheet');
    var closeBtn = document.getElementById('kin-bug-close');
    var doneBtn  = document.getElementById('kin-br-done');
    var form     = document.getElementById('kin-br-form');
    var formView = document.getElementById('kin-br-form-view');
    var successView = document.getElementById('kin-br-success-view');
    var anonToggle = document.getElementById('kin-br-anon-toggle');
    var extras   = document.getElementById('kin-br-extras');
    var anon     = true;
    function openSheet() { backdrop.classList.add('open'); sheet.style.display='block'; requestAnimationFrame(function(){sheet.classList.add('open');}); }
    function closeSheet() { sheet.classList.remove('open'); setTimeout(function(){ sheet.style.display='none'; backdrop.classList.remove('open'); form.reset(); formView.style.display='block'; successView.style.display='none'; anon=true; anonToggle.classList.remove('off'); extras.style.display='none'; },300); }
    btn.addEventListener('click', openSheet);
    backdrop.addEventListener('click', closeSheet);
    closeBtn.addEventListener('click', closeSheet);
    doneBtn.addEventListener('click', closeSheet);
    anonToggle.addEventListener('click', function(){ anon=!anon; anonToggle.classList.toggle('off',!anon); extras.style.display=anon?'none':'flex'; });
    var SHEETS_URL='https://script.google.com/macros/s/AKfycbxBRGfOmtQUxyaBGjYVj2mtKinI7qlGm1v921K49TiBDP5RUY9CWK_M-vpLCm2HWJxhuA/exec';
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var data=new FormData(form);
      var typeRaw=data.get('type')||'';
      var formType='bug';
      if(typeRaw.toLowerCase().indexOf('feature')!==-1)formType='idea';
      else if(typeRaw.toLowerCase().indexOf('other')!==-1)formType='app_suggestion';
      fetch(SHEETS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({form_type:formType,subject:'KIN-026 — Kin Ground',app:'KIN-026',type:typeRaw,description:data.get('description')||'',name:anon?'Anonymous':(data.get('name')||'Not provided'),email:anon?'Anonymous':(data.get('email')||'Not provided')})}).catch(function(){});
      formView.style.display='none';
      successView.style.display='block';
    });
  })();
  </script>
  </body>

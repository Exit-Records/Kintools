name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_all:
        description: 'Deploy all workers (not just changed ones)'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy changed Kin workers

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Write worker generator script
        run: |
          cat > /tmp/gen-worker.py << 'EOF'
          import sys, json, os
          html_file = sys.argv[1]
          worker_name = sys.argv[2]
          with open(html_file, 'r', encoding='utf-8') as f:
              html = f.read()
          escaped = json.dumps(html)
          worker_js = (
              "export default {\n"
              "  async fetch(request, env, ctx) {\n"
              "    return new Response(" + escaped + ", {\n"
              "      headers: { 'content-type': 'text/html;charset=UTF-8' }\n"
              "    });\n"
              "  }\n"
              "};\n"
          )
          out_path = "/tmp/worker-" + worker_name + ".mjs"
          with open(out_path, 'w') as f:
              f.write(worker_js)
          print("Written: " + out_path)
          EOF

      - name: Detect changed files
        id: changes
        run: |
          if [ "${{ github.event.inputs.deploy_all }}" = "true" ]; then
            echo "deploy_all=true" >> $GITHUB_OUTPUT
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BEFORE="HEAD~1"
            fi
            CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
            echo "Changed files:"
            echo "$CHANGED"
            echo "changed_files<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Deploy workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          CHANGED="${{ steps.changes.outputs.changed_files }}"
          DEPLOY_ALL="${{ steps.changes.outputs.deploy_all }}"

          deploy_worker() {
            local worker_name="$1"
            local html_file="$2"
            if [ ! -f "$html_file" ]; then
              echo "Skipping $worker_name — $html_file not found"
              return
            fi
            echo "Deploying $worker_name..."
            python3 /tmp/gen-worker.py "$html_file" "$worker_name"
            wrangler deploy "/tmp/worker-${worker_name}.mjs" \
              --name "$worker_name" \
              --compatibility-date "2024-01-01"
            echo "Done: $worker_name"
          }

          should_deploy() {
            local pattern="$1"
            if [ "$DEPLOY_ALL" = "true" ]; then return 0; fi
            echo "$CHANGED" | grep -q "$pattern"
          }

          if should_deploy "index.html\|kin-landing"; then
            deploy_worker "kin-landing" "sites/kin-landing/index.html"
          fi

          for site_dir in sites/kin-*/; do
            if [ -d "$site_dir" ]; then
              worker_name=$(basename "$site_dir")
              html_file="${site_dir}index.html"
              if should_deploy "$site_dir"; then
                deploy_worker "$worker_name" "$html_file"
              fi
            fi
          done

          echo "Deploy complete"
